<title>Globe Express — Sign In</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           GoogleAuthProvider, signInWithPopup, onAuthStateChanged, sendPasswordResetEmail
         } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

 
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const analytics = getAnalytics(app);
  const googleProvider = new GoogleAuthProvider();

  // Expose to window so onclick handlers can call them
  window._auth           = auth;
  window._googleProvider = googleProvider;
  window._signIn         = signInWithEmailAndPassword;
  window._createUser     = createUserWithEmailAndPassword;
  window._googleSignIn   = signInWithPopup;
  window._resetPass      = sendPasswordResetEmail;

  // Auth state observer
  onAuthStateChanged(auth, user => {
    if (user) {
      console.log('Logged in:', user.email || user.displayName);
      // window.location.href = '/dashboard'; // redirect after login
      showAlert('login', 'success', `ยินดีต้อนรับ ${user.displayName || user.email}`);
    }
  });
</script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --yellow:    #F5C843;
  --yellow-dk: #c99e20;
  --white:     #ffffff;
  --glass:     rgba(255,255,255,0.10);
  --glass-bdr: rgba(255,255,255,0.22);
  --input-bg:  rgba(255,255,255,0.10);
  --text-dim:  rgba(255,255,255,0.50);
  --red:       #ff6b6b;
  --green:     #51cf66;
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family:'Poppins', sans-serif;
  background:#0a0a0a;
}

/* ══ BACKGROUND SLIDES ══ */
#bg-wrap {
  position:fixed; inset:0; z-index:0; overflow:hidden;
}
.bg-slide {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  opacity:0;
  transform:scale(1.06);
  transition: opacity .9s ease, transform 5s ease;
  will-change:transform,opacity;
}
.bg-slide.active { opacity:1; transform:scale(1); }
#bg-wrap::after {
  content:'';
  position:absolute; inset:0; z-index:2;
  background:
    linear-gradient(to bottom, rgba(0,0,0,.45) 0%, rgba(0,0,0,.15) 40%, rgba(0,0,0,.55) 100%),
    linear-gradient(to right,  rgba(0,0,0,.35) 0%, transparent 60%);
  pointer-events:none;
}

/* ══ NAVBAR ══ */
#navbar {
  position:fixed; top:0; left:0; right:0; z-index:60;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 36px;
}
.nav-logo {
  font-family:'Oswald',sans-serif;
  font-size:15px; font-weight:700;
  letter-spacing:4px; color:#fff;
  text-transform:uppercase;
}
.nav-right {
  font-size:11px; letter-spacing:2px;
  color:rgba(255,255,255,.5);
  text-transform:uppercase;
}

/* ══ CARDS STRIP (bottom) ══ */
#cards-section {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  padding:0 0 22px 0;
  display:flex; align-items:flex-end; justify-content:center;
  pointer-events:auto;
  -webkit-touch-callout:none;
}
#cards-strip {
  display:flex; gap:9px; align-items:flex-end;
  padding:0 20px;
  /* Prevent native scroll hijack */
  touch-action:none;
}
.dest-card {
  position:relative;
  width:100px; height:140px;
  border-radius:8px; overflow:hidden;
  cursor:pointer; flex-shrink:0;
  transition: width .5s cubic-bezier(.77,0,.18,1),
              height .5s cubic-bezier(.77,0,.18,1),
              box-shadow .3s ease;
  -webkit-user-select:none; user-select:none;
}
.dest-card.active {
  width:145px; height:165px;
  box-shadow:0 0 0 2px var(--yellow), 0 12px 32px rgba(0,0,0,.5);
}
.card-img {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  transform:scale(1);
  transition:transform .6s ease, filter .4s ease;
  filter:brightness(.65);
}
.dest-card.active .card-img { transform:scale(1.05); filter:brightness(.85); }
.card-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 55%);
  z-index:2;
}
.card-info {
  position:absolute; bottom:0; left:0; right:0;
  padding:10px 10px; z-index:3;
}
.card-place {
  font-family:'Oswald',sans-serif;
  font-size:11px; font-weight:600;
  color:#fff; text-transform:uppercase;
  letter-spacing:.8px; line-height:1.2;
}
.card-region { font-size:9px; color:rgba(255,255,255,.5); margin-top:2px; }
.card-dot {
  position:absolute; top:9px; right:9px;
  width:7px; height:7px; border-radius:50%;
  background:var(--yellow); z-index:5;
  opacity:0; transform:scale(0);
  transition:opacity .3s, transform .3s;
}
.dest-card.active .card-dot { opacity:1; transform:scale(1); }
.card-progress {
  position:absolute; bottom:0; left:0;
  height:3px; background:var(--yellow);
  width:0%; z-index:6; border-radius:0 2px 0 0;
}

/* ══ PREV / NEXT ARROWS ══ */
#nav-arrows {
  position:fixed; bottom:80px; right:24px; z-index:60;
  display:flex; flex-direction:column; gap:8px;
}
.nav-arrow {
  width:38px; height:38px; border-radius:50%;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(8px);
  color:#fff; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .25s ease;
}
.nav-arrow:hover { background:var(--yellow); border-color:var(--yellow); color:#1a1400; }

/* slide counter */
#slide-counter {
  position:fixed; bottom:190px; right:28px; z-index:60;
  font-family:'Oswald',sans-serif; font-size:11px;
  color:rgba(255,255,255,.4); letter-spacing:2px; text-align:center;
}
#slide-counter strong { display:block; font-size:20px; color:#fff; margin-bottom:2px; }

/* ══ CENTER: AUTH GLASS CARD ══ */
#auth-wrapper {
  position:fixed; inset:0; z-index:55;
  display:flex; align-items:center; justify-content:center;
  padding:80px 20px 210px;   /* top:navbar, bottom:cards */
  pointer-events:none;       /* let card strip clicks pass through */
}

/* TABS */
.auth-tabs {
  display:flex; gap:4px; margin-bottom:22px;
  background:rgba(0,0,0,.3); border-radius:10px; padding:4px;
}
.tab-btn {
  flex:1; padding:9px 0;
  border:none; background:transparent;
  color:rgba(255,255,255,.45);
  font-family:'Poppins',sans-serif; font-size:12px;
  font-weight:500; letter-spacing:1px;
  text-transform:uppercase; border-radius:7px;
  cursor:pointer; transition:all .3s ease;
}
.tab-btn.active { background:rgba(255,255,255,.12); color:#fff; }

/* FORM PANEL */
.form-panel { display:none; }
.form-panel.active { display:block; }

.form-title {
  font-family:'Oswald',sans-serif;
  font-size:26px; font-weight:600;
  color:#fff; margin-bottom:4px; letter-spacing:.5px;
}
.form-sub { font-size:11px; color:var(--text-dim); margin-bottom:20px; letter-spacing:.3px; }

/* ALERT */
.alert {
  display:none; align-items:center; gap:8px;
  padding:10px 14px; border-radius:9px;
  font-size:12px; margin-bottom:14px;
  border:1px solid; animation:fadeIn .3s ease;
}
.alert.show { display:flex; }
.alert-error   { background:rgba(255,107,107,.12); border-color:rgba(255,107,107,.35); color:#ff9999; }
.alert-success { background:rgba(81,207,102,.12);  border-color:rgba(81,207,102,.35);  color:#7ee8a2; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

/* INPUT */
.input-group { margin-bottom:13px; }
.input-field {
  position:relative; display:flex; align-items:center;
}
.input-field i.icon-left {
  position:absolute; left:13px;
  font-size:17px; color:var(--text-dim);
  pointer-events:none; z-index:1;
  transition:color .3s;
}
.input-group:focus-within .input-field i.icon-left { color:var(--yellow); }
.input-field input {
  width:100%;
  background:var(--input-bg);
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;
  padding:12px 40px 12px 40px;
  color:#fff; font-family:'Poppins',sans-serif; font-size:13px;
  outline:none; transition:all .3s ease;
}
.input-field input::placeholder { color:rgba(255,255,255,.35); }
.input-field input:focus {
  border-color:rgba(245,200,67,.55);
  background:rgba(255,255,255,.13);
  box-shadow:0 0 0 3px rgba(245,200,67,.12);
}
.input-field input:-webkit-autofill {
  -webkit-box-shadow:0 0 0 1000px rgba(20,20,20,.8) inset !important;
  -webkit-text-fill-color:#fff !important;
}
.toggle-pw {
  position:absolute; right:12px;
  background:none; border:none; cursor:pointer;
  color:var(--text-dim); font-size:17px; padding:0;
  transition:color .25s; z-index:2;
}
.toggle-pw:hover { color:#fff; }

/* REMEMBER / FORGOT */
.row-flex {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:18px;
}
.row-flex label { font-size:12px; color:var(--text-dim); cursor:pointer; display:flex; gap:7px; align-items:center; }
.row-flex input[type=checkbox] { accent-color:var(--yellow); width:14px; height:14px; }
.forgot-link { font-size:12px; color:rgba(255,255,255,.4); text-decoration:none; transition:color .25s; }
.forgot-link:hover { color:var(--yellow); }

/* BUTTONS */
.btn-gold {
  width:100%; padding:13px;
  border:none; border-radius:10px;
  background:linear-gradient(135deg, var(--yellow-dk) 0%, var(--yellow) 60%, #ffe066 100%);
  color:#1a1200; font-family:'Poppins',sans-serif;
  font-size:13px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; position:relative; overflow:hidden;
  transition:all .3s ease; margin-bottom:4px;
}
.btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(245,200,67,.4); }
.btn-gold:active { transform:translateY(0); }
.btn-outline-w {
  width:100%; padding:13px;
  border:1px solid rgba(255,255,255,.2);
  border-radius:10px; background:rgba(255,255,255,.07);
  color:#fff; font-family:'Poppins',sans-serif;
  font-size:13px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; transition:all .3s ease; margin-bottom:4px;
}
.btn-outline-w:hover { background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.35); transform:translateY(-1px); }
.spinner {
  display:none; width:16px; height:16px;
  border:2px solid currentColor; border-top-color:transparent;
  border-radius:50%; animation:spin .7s linear infinite;
  position:absolute; right:18px; top:50%; transform:translateY(-50%);
}
.loading .spinner { display:block; }
@keyframes spin { to{transform:translateY(-50%) rotate(360deg)} }

/* DIVIDER */
.divider {
  display:flex; align-items:center; gap:10px;
  margin:14px 0; color:var(--text-dim);
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
}
.divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.1); }

/* GOOGLE BTN */
.btn-google {
  width:100%; padding:11px;
  border:1px solid rgba(255,255,255,.15);
  border-radius:10px; background:rgba(255,255,255,.06);
  color:#fff; font-family:'Poppins',sans-serif;
  font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:9px;
  transition:all .25s ease;
}
.btn-google:hover { background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.3); }
.btn-google img { width:18px; height:18px; }

/* SWITCH */
.switch-link {
  text-align:center; margin-top:14px;
  font-size:12px; color:var(--text-dim);
}
.switch-link a { color:var(--yellow); text-decoration:none; font-weight:500; }

/* PASS STRENGTH */
.strength-bars { display:flex; gap:4px; margin-top:6px; }
.s-bar { flex:1; height:3px; border-radius:99px; background:rgba(255,255,255,.1); transition:background .3s; }

/* PROGRESS LINE */
#progress-line {
  position:fixed; top:0; left:0;
  height:2px; width:0%; background:var(--yellow);
  z-index:999; transition:none;
}

/* RESPONSIVE */
@media (max-width:480px) {
  .glass-card { padding:24px 18px 22px; }
  #auth-wrapper { padding:68px 14px 200px; }
  .dest-card { width:84px; height:118px; }
  .dest-card.active { width:118px; height:138px; }
  #nav-arrows { display:none; }
}
</style>

<script>
/* ══════════════════════════════════════

const destinations = [

    map:"https://www.google.com/maps/place/Göreme"
  },
  {
    name:"Nangano\nPrefecture",  region:"Japan Alps",
    img:"https://plus.unsplash.com/premium_photo-1756131938884-f8ae4e2d6a78?q=80&w=750&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
    map:"https://www.google.com/maps/place/Nagano+Prefecture"
  },
  {
    name:"Marrakech\nMerouga",   region:"Sahara Desert · Morocco",
    img:"https://images.unsplash.com/photo-1489493887464-892be6d1daae?w=1600&q=85",
    map:"https://www.google.com/maps/place/Merzouga"
  },
  {
    name:"Nangano\nPrefecture",  region:"Japan Alps",
    img:"https://images.unsplash.com/photo-1587551329971-31ef450a12f3?q=80&w=626&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
    map:"https://www.google.com/maps/place/Nagano+Prefecture"
  },
   {
    name:"Yosemite\nNat. Park",  region:"Sierra Nevada · USA",
    img:"https://images.unsplash.com/photo-1776734213580-d372bb764de9?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
    map:"https://www.google.com/maps/place/Yosemite+National+Park"
  },
  {
    name:"Saint\nAntoinen",      region:"Swiss Alps · Switzerland",
    img:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=85",
    map:"https://www.google.com/maps/place/Switzerland"
  }
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let current = 0;
let isAnimating = false;
let autoRaf = null;
let elapsed = 0;
let lastTs  = null;
const AUTO_MS = 6000;

/* ══════════════════════════════════════
   BUILD DOM
══════════════════════════════════════ */
function buildDOM() {
  const bgWrap = document.getElementById('bg-wrap');
  const strip  = document.getElementById('cards-strip');

  destinations.forEach((d, i) => {
    // BG slide
    const slide = document.createElement('div');
    slide.className = 'bg-slide' + (i===0 ? ' active' : '');
    slide.style.backgroundImage = `url(${d.img})`;
    bgWrap.appendChild(slide);

    // Card
    const card = document.createElement('div');
    card.className = 'dest-card' + (i===0 ? ' active' : '');
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-img" style="background-image:url(${d.img})"></div>
      <div class="card-overlay"></div>
      <div class="card-dot"></div>
      <div class="card-progress" id="prog-${i}"></div>
      <div class="card-info">
        <div class="card-place">${d.name.replace('\n',' ')}</div>
        <div class="card-region">${d.region.split('·')[0].trim()}</div>
      </div>
    `;
    strip.appendChild(card);
  });

  document.getElementById('tot-num').textContent = '/' + String(destinations.length).padStart(2,'0');
}

/* ══════════════════════════════════════
   SWITCH SLIDE (with GSAP zoom bg)
══════════════════════════════════════ */
function switchTo(next, fromAuto=false) {
  next = ((next % destinations.length) + destinations.length) % destinations.length;
  if (next === current || isAnimating) return;
  isAnimating = true;

  const prev = current;
  current    = next;

  const bgs   = document.querySelectorAll('.bg-slide');
  const cards = document.querySelectorAll('.dest-card');

  // Get clicked card rect for zoom origin
  const targetCard = cards[current];
  const rect = targetCard.getBoundingClientRect();
  const ox = ((rect.left + rect.width/2)  / window.innerWidth  * 100).toFixed(1) + '%';
  const oy = ((rect.top  + rect.height/2) / window.innerHeight * 100).toFixed(1) + '%';

  // New bg: start scaled-down from card position, zoom to full
  const newBg = bgs[current];
  newBg.style.transformOrigin = `${ox} ${oy}`;
  gsap.set(newBg,  { opacity:0, scale:0.3 });
  newBg.classList.add('active');

  gsap.to(newBg, {
    opacity:1, scale:1, duration:.75, ease:'power3.inOut',
    onComplete:() => {
      // fade out old bg
      gsap.to(bgs[prev], {
        opacity:0, scale:1.06, duration:.4, ease:'power2.in',
        onComplete:() => {
          bgs[prev].classList.remove('active');
          gsap.set(bgs[prev], { scale:1, opacity:0, transformOrigin:'center center' });
          newBg.style.transformOrigin = 'center center';
          isAnimating = false;
        }
      });
    }
  });

  // Swap card active
  cards.forEach((c,i) => c.classList.toggle('active', i===current));

  // Reset old progress bar
  gsap.set(`#prog-${prev}`, { width:'0%' });

  // Counter
  document.getElementById('cur-num').textContent = String(current+1).padStart(2,'0');

  if (!fromAuto) resetAuto();
}

/* ══════════════════════════════════════
   AUTO PLAY
══════════════════════════════════════ */
function tickAuto(ts) {
  if (!lastTs) lastTs = ts;
  elapsed += ts - lastTs;
  lastTs   = ts;

  const pct = Math.min(elapsed / AUTO_MS * 100, 100);
  const prog = document.getElementById(`prog-${current}`);
  if (prog) prog.style.width = pct + '%';
  document.getElementById('progress-line').style.width = pct + '%';

  if (elapsed >= AUTO_MS) {
    elapsed = 0; lastTs = null;
    if (prog) prog.style.width = '0%';
    switchTo(current + 1, true);
  }
  autoRaf = requestAnimationFrame(tickAuto);
}
function startAuto() { elapsed=0; lastTs=null; autoRaf=requestAnimationFrame(tickAuto); }
function stopAuto()  { cancelAnimationFrame(autoRaf); }
function resetAuto() {
  stopAuto();
  const p = document.getElementById(`prog-${current}`);
  if (p) p.style.width = '0%';
  document.getElementById('progress-line').style.width = '0%';
  elapsed=0; lastTs=null;
  setTimeout(startAuto, 350);
}

/* ══════════════════════════════════════
   CONTROLS: ARROWS + KEYBOARD
══════════════════════════════════════ */
document.getElementById('btn-prev').addEventListener('click', () => switchTo(current-1));
document.getElementById('btn-next').addEventListener('click', () => switchTo(current+1));

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') switchTo(current+1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   switchTo(current-1);
});

/* ══════════════════════════════════════
   TOUCH: QUICK SWIPE ONLY
   - ถ้ากดค้าง (hold > 300ms) จะไม่เลื่อน
   - ต้องปล่อยเร็วและเลื่อนระยะ > 30px ถึงจะเปลี่ยน slide
══════════════════════════════════════ */
(function setupTouch() {
  let startX=0, startY=0, startT=0;
  const HOLD_LIMIT    = 280;  // ms — ถ้า hold นานกว่านี้ ไม่เลื่อน
  const SWIPE_MIN     = 30;   // px — ระยะขั้นต่ำ

  // Listen on the whole document body (excluding glass card — that handles its own scroll)
  const cardsEl = document.getElementById('cards-section');

  cardsEl.addEventListener('touchstart', e => {
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    startT = Date.now();
  }, { passive:true });

  cardsEl.addEventListener('touchend', e => {
    const t    = e.changedTouches[0];
    const dx   = t.clientX - startX;
    const dy   = t.clientY - startY;
    const held = Date.now() - startT;

    // Skip if held too long OR mostly vertical movement
    if (held > HOLD_LIMIT) return;
    if (Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) < SWIPE_MIN) return;

    dx < 0 ? switchTo(current+1) : switchTo(current-1);
  }, { passive:true });
})();

/* ══════════════════════════════════════
   CARD TAP
══════════════════════════════════════ */
(function setupCardTap() {
  document.getElementById('cards-strip').addEventListener('click', e => {
    const card = e.target.closest('.dest-card');
    if (!card) return;
    switchTo(parseInt(card.dataset.index));
  });
})();

/* ══════════════════════════════════════
   WHEEL (desktop)
══════════════════════════════════════ */
let wLock = false;
document.addEventListener('wheel', e => {
  // Don't trigger if wheeling inside the glass card
  if (e.target.closest('.glass-card')) return;
  if (wLock) return;
  wLock = true; setTimeout(() => wLock=false, 800);
  e.deltaY > 0 ? switchTo(current+1) : switchTo(current-1);
}, { passive:true });

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function init() {
  buildDOM();
  document.getElementById('cur-num').textContent = '01';

  // Entrance animation
  gsap.set('.glass-card', { opacity:0, y:30, scale:.97 });
  gsap.to('.glass-card', { opacity:1, y:0, scale:1, duration:.9, ease:'back.out(1.4)', delay:.5 });

  gsap.set('.dest-card', { opacity:0, y:35, scale:.9 });
  gsap.to('.dest-card', { opacity:1, y:0, scale:1, duration:.6, stagger:.08, ease:'back.out(1.4)', delay:.7 });

  const firstBg = document.querySelector('.bg-slide.active');
  gsap.from(firstBg, { scale:1.1, opacity:0, duration:1.5, ease:'power3.out', delay:.15 });

  startAuto();
}

init();

/* ══════════════════════════════════════
   AUTH UI HELPERS
══════════════════════════════════════ */
function toggleForm(panel) {
  document.getElementById('form-login').classList.toggle('active', panel==='login');
  document.getElementById('form-register').classList.toggle('active', panel==='register');
  const tabs = document.querySelectorAll('.tab-btn');
  tabs[0].classList.toggle('active', panel==='login');
  tabs[1].classList.toggle('active', panel==='register');
}

function togglePW(id, btn) {
  const inp  = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (inp.type==='password') { inp.type='text';     icon.className='bx bx-show'; }
  else                       { inp.type='password'; icon.className='bx bx-hide'; }
}

function checkStrength(v) {
  let s=0;
  if (v.length>=8) s++;
  if (/[A-Z]/.test(v)) s++;
  if (/[0-9]/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  const colors = ['#ff6b6b','#ffa94d','#74c0fc','#51cf66'];
  [1,2,3,4].forEach(n => {
    const el = document.getElementById('sb'+n);
    el.style.background = n<=s ? colors[s-1] : 'rgba(255,255,255,.1)';
  });
}

function showAlert(form, type, msg) {
  // hide all alerts in this form
  document.querySelectorAll(`#form-${form} .alert`).forEach(a => a.classList.remove('show'));
  const alertId = type==='success'
    ? (form==='login' ? 'login-ok'   : 'reg-alert')
    : (form==='login' ? 'login-alert': 'reg-alert');
  const msgId   = type==='success'
    ? (form==='login' ? 'login-ok-msg' : 'reg-alert-msg')
    : (form==='login' ? 'login-alert-msg' : 'reg-alert-msg');
  const alertEl = document.getElementById(alertId);
  const msgEl   = document.getElementById(msgId);
  if (alertEl) {
    if (type==='success') { alertEl.className='alert alert-success show'; }
    else                  { alertEl.className='alert alert-error show'; }
    if (msgEl && msg) msgEl.textContent = msg;
    setTimeout(() => alertEl.classList.remove('show'), 5000);
  }
}

function setBtnLoading(id, on) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

/* ══════════════════════════════════════
   FIREBASE AUTH ACTIONS
══════════════════════════════════════ */
function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) { showAlert('login','error','กรุณากรอกอีเมลและรหัสผ่าน'); return; }
  if (!window._auth)   { showAlert('login','error','Firebase กำลังโหลด...'); return; }

  setBtnLoading('btn-login', true);
  window._signIn(window._auth, email, pass)
    .then(cred => {
      showAlert('login','success', `ยินดีต้อนรับ ${cred.user.email}`);
      setBtnLoading('btn-login', false);
      // window.location.href = '/dashboard';
    })
    .catch(err => {
      const msg = firebaseErrMsg(err.code);
      showAlert('login','error', msg);
      setBtnLoading('btn-login', false);
    });
}

function doRegister() {
  const name    = document.getElementById('reg-name').value.trim();
  const email   = document.getElementById('reg-email').value.trim();
  const pass    = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;

  if (!name||!email||!pass) { showAlert('register','error','กรุณากรอกข้อมูลให้ครบ'); return; }
  if (pass!==confirm)       { showAlert('register','error','รหัสผ่านไม่ตรงกัน'); return; }
  if (pass.length<8)        { showAlert('register','error','รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
  if (!window._auth)        { showAlert('register','error','Firebase กำลังโหลด...'); return; }

  setBtnLoading('btn-register', true);
  window._createUser(window._auth, email, pass)
    .then(cred => {
      showAlert('register','success','สมัครสมาชิกสำเร็จ!');
      setBtnLoading('btn-register', false);
    })
    .catch(err => {
      showAlert('register','error', firebaseErrMsg(err.code));
      setBtnLoading('btn-register', false);
    });
}

function doGoogle() {
  if (!window._auth) { alert('Firebase กำลังโหลด...'); return; }
  window._googleSignIn(window._auth, window._googleProvider)
    .then(result => {
      showAlert('login','success', `ยินดีต้อนรับ ${result.user.displayName}`);
    })
    .catch(err => {
      showAlert('login','error', firebaseErrMsg(err.code));
    });
}

function doForgot(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showAlert('login','error','กรุณากรอกอีเมลก่อน'); return; }
  if (!window._auth) return;
  window._resetPass(window._auth, email)
    .then(() => showAlert('login','success','ส่งลิงก์รีเซ็ตไปที่อีเมลแล้ว'))
    .catch(err => showAlert('login','error', firebaseErrMsg(err.code)));
}

function firebaseErrMsg(code) {
  const map = {
    'auth/invalid-email':            'รูปแบบอีเมลไม่ถูกต้อง',
    'auth/user-not-found':           'ไม่พบบัญชีนี้',
    'auth/wrong-password':           'รหัสผ่านไม่ถูกต้อง',
    'auth/invalid-credential':       'อีเมลหรือรหัสผ่านไม่ถูกต้อง',
    'auth/email-already-in-use':     'อีเมลนี้ถูกใช้งานแล้ว',
    'auth/weak-password':            'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร',
    'auth/too-many-requests':        'ลองใหม่อีกครั้งในภายหลัง',
    'auth/popup-closed-by-user':     'ยกเลิกการเข้าสู่ระบบ',
    'auth/network-request-failed':   'ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต',
  };
  return map[code] || 'เกิดข้อผิดพลาด: ' + code;
}

// Enter key submit
document.addEventListener('keydown', e => {
  if (e.key!=='Enter') return;
  if (document.getElementById('form-login').classList.contains('active')) doLogin();
  else doRegister();
});
</script>
