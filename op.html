<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --yellow:#F5C843; --ydark:#c99e20;
  --white:#fff;
  --text-dim:rgba(255,255,255,.5);
}
html,body { width:100%; height:100%; overflow:hidden; font-family:'Inter',sans-serif; background:#090c10; }

/* ══ BACKGROUND ══ */
#bg-wrap { position:fixed; inset:0; z-index:0; overflow:hidden; }
.bg-slide {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  opacity:0; transform:scale(1.07);
  will-change:transform,opacity;
}
.bg-slide.active { opacity:1; transform:scale(1); }
#bg-wrap::after {
  content:''; position:absolute; inset:0; z-index:2;
  background:
    linear-gradient(to right, rgba(0,0,0,.72) 0%, rgba(0,0,0,.3) 55%, rgba(0,0,0,.1) 100%),
    linear-gradient(to top,   rgba(0,0,0,.65) 0%, transparent 40%),
    linear-gradient(to bottom,rgba(0,0,0,.4)  0%, transparent 30%);
  pointer-events:none;
}

/* ══ PROGRESS LINE ══ */
#prog-line { position:fixed; top:0; left:0; height:2px; width:0%; background:var(--yellow); z-index:999; }

/* ══ NAVBAR ══ */
#navbar {
  position:fixed; top:0; left:0; right:0; z-index:60;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 48px;
}
.nav-logo {
  font-family:'Oswald',sans-serif; font-size:15px; font-weight:700;
  letter-spacing:5px; color:#fff; text-transform:uppercase;
}
.nav-links { display:flex; gap:28px; list-style:none; }
.nav-links a {
  color:rgba(255,255,255,.55); text-decoration:none;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  transition:color .25s;
}
.nav-links a:hover { color:#fff; }
.nav-signin {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  color:#fff; font-family:'Inter',sans-serif; font-size:11px;
  letter-spacing:2px; text-transform:uppercase;
  padding:9px 20px; border-radius:6px; cursor:pointer;
  text-decoration:none; transition:all .25s;
}
.nav-signin:hover { background:var(--yellow); border-color:var(--yellow); color:#1a1200; }

/* ══ LEFT CONTENT ══ */
#left-panel {
  position:fixed; left:48px; top:50%; transform:translateY(-50%);
  z-index:40; max-width:460px;
}
.dest-region {
  font-size:11px; letter-spacing:4px; color:rgba(255,255,255,.5);
  text-transform:uppercase; margin-bottom:12px;
  display:flex; align-items:center; gap:10px;
}
.dest-region::before { content:''; width:28px; height:1px; background:rgba(255,255,255,.4); }
.dest-title {
  font-family:'Oswald',sans-serif;
  font-size:clamp(44px,5.5vw,74px);
  font-weight:700; line-height:.92;
  text-transform:uppercase; color:#fff;
  letter-spacing:-1px; margin-bottom:16px;
}
.dest-desc {
  font-size:13px; line-height:1.75;
  color:rgba(255,255,255,.55); max-width:340px;
  margin-bottom:26px; font-weight:300;
}
.btn-discover {
  display:inline-flex; align-items:center; gap:10px;
  background:var(--yellow); color:#1a1200;
  font-family:'Inter',sans-serif; font-size:11px;
  font-weight:600; letter-spacing:3px; text-transform:uppercase;
  padding:13px 26px; border:none; cursor:pointer;
  border-radius:3px; transition:all .25s;
  text-decoration:none;
}
.btn-discover:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(245,200,67,.4); }
.btn-discover svg { width:13px; transition:transform .2s; }
.btn-discover:hover svg { transform:translateX(4px); }

/* ══ LOCATION BADGE (bottom-left) ══ */
#loc-badge {
  position:fixed; left:48px; bottom:210px; z-index:50;
  display:flex; align-items:center; gap:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px; overflow:hidden;
  transform:translateY(0);
  transition:opacity .4s, transform .4s;
}
.loc-pin {
  padding:12px 14px;
  border-right:1px solid rgba(255,255,255,.1);
  font-size:18px; line-height:1;
  background:rgba(245,200,67,.12);
}
.loc-info { padding:10px 14px; }
.loc-city {
  font-family:'Oswald',sans-serif; font-size:13px;
  font-weight:600; color:#fff; letter-spacing:.5px;
  text-transform:uppercase; line-height:1;
}
.loc-detail {
  font-size:10px; color:rgba(255,255,255,.5);
  letter-spacing:1px; margin-top:3px; text-transform:uppercase;
}
.loc-country {
  font-size:10px; color:var(--yellow);
  letter-spacing:2px; margin-top:2px; text-transform:uppercase;
}
.loc-map-btn {
  display:flex; align-items:center; gap:6px;
  padding:10px 16px;
  border-left:1px solid rgba(255,255,255,.1);
  background:rgba(245,200,67,.1);
  color:var(--yellow); text-decoration:none;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  font-weight:600; transition:all .25s; white-space:nowrap;
}
.loc-map-btn:hover { background:var(--yellow); color:#1a1200; }
.loc-map-btn svg { width:12px; }

/* ══ SLIDE COUNTER ══ */
#slide-counter {
  position:fixed; right:32px; bottom:220px; z-index:60;
  text-align:center;
}
#slide-counter strong {
  font-family:'Oswald',sans-serif; font-size:22px;
  color:#fff; display:block; line-height:1;
}
#slide-counter span { font-size:11px; color:rgba(255,255,255,.4); letter-spacing:2px; }

/* ══ NAV ARROWS ══ */
#nav-arrows {
  position:fixed; right:30px; bottom:145px; z-index:60;
  display:flex; gap:8px;
}
.nav-arr {
  width:38px; height:38px; border-radius:50%;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.3); backdrop-filter:blur(8px);
  color:#fff; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .25s;
}
.nav-arr:hover { background:var(--yellow); border-color:var(--yellow); color:#1a1200; }

/* ══ CARDS STRIP ══ */
#cards-section {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  padding:0 0 24px 0;
  display:flex; justify-content:center; align-items:flex-end;
}
#cards-strip {
  display:flex; gap:10px; align-items:flex-end;
  padding:0 24px; touch-action:none;
  -webkit-user-select:none; user-select:none;
}
.dest-card {
  position:relative; width:105px; height:145px;
  border-radius:8px; overflow:hidden; cursor:pointer;
  flex-shrink:0;
  transition:width .5s cubic-bezier(.77,0,.18,1),
             height .5s cubic-bezier(.77,0,.18,1),
             box-shadow .3s;
}
.dest-card.active {
  width:148px; height:170px;
  box-shadow:0 0 0 2px var(--yellow), 0 10px 30px rgba(0,0,0,.5);
}
.card-img {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  filter:brightness(.65); transform:scale(1);
  transition:filter .4s, transform .6s;
}
.dest-card.active .card-img  { filter:brightness(.85); transform:scale(1.05); }
.dest-card:hover .card-img   { filter:brightness(.8);  transform:scale(1.04); }
.card-over {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 55%);
  z-index:2;
}
.card-dot {
  position:absolute; top:9px; right:9px;
  width:7px; height:7px; border-radius:50%;
  background:var(--yellow); z-index:5;
  opacity:0; transform:scale(0);
  transition:opacity .3s, transform .3s;
}
.dest-card.active .card-dot { opacity:1; transform:scale(1); }
.card-prog {
  position:absolute; bottom:0; left:0;
  height:3px; background:var(--yellow);
  width:0%; z-index:6; border-radius:0 2px 0 0;
}
.card-info {
  position:absolute; bottom:0; left:0; right:0;
  padding:10px 10px; z-index:3;
}
.card-place {
  font-family:'Oswald',sans-serif; font-size:11px;
  font-weight:600; color:#fff; text-transform:uppercase;
  letter-spacing:.8px; line-height:1.2;
}
.card-reg { font-size:9px; color:rgba(255,255,255,.45); margin-top:2px; }

/* ══ COOKIE TOAST ══ */
#cookie-toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  z-index:999; background:rgba(10,10,16,.92);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.12); border-radius:12px;
  padding:14px 20px 14px 18px;
  display:flex; align-items:center; gap:14px;
  max-width:380px; width:calc(100% - 40px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transition:transform .5s cubic-bezier(.34,1.3,.64,1), opacity .4s;
  opacity:0;
}
#cookie-toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.cookie-icon { font-size:22px; flex-shrink:0; }
.cookie-text { flex:1; }
.cookie-text p { font-size:12px; color:rgba(255,255,255,.75); line-height:1.5; }
.cookie-text strong { color:#fff; }
.cookie-btns { display:flex; gap:8px; flex-shrink:0; }
.btn-cookie-ok {
  background:var(--yellow); color:#1a1200;
  border:none; border-radius:6px; padding:8px 16px;
  font-size:11px; font-weight:600; letter-spacing:1px;
  cursor:pointer; white-space:nowrap; transition:all .2s;
}
.btn-cookie-ok:hover { background:#ffe066; }
.btn-cookie-decline {
  background:rgba(255,255,255,.08); color:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.15); border-radius:6px;
  padding:8px 12px; font-size:11px; cursor:pointer; transition:all .2s;
}
.btn-cookie-decline:hover { color:#fff; border-color:rgba(255,255,255,.3); }

/* ══ RESPONSIVE ══ */
@media(max-width:768px) {
  #navbar { padding:16px 20px; }
  .nav-links { display:none; }
  #left-panel { left:20px; right:20px; max-width:100%;
    top:auto; transform:none; bottom:310px; }
  .dest-desc { display:none; }
  .dest-title { font-size:36px; }
  #loc-badge { left:20px; bottom:295px; }
  #slide-counter, #nav-arrows { display:none; }
  #cards-section { padding:0 0 16px; }
  .dest-card { width:90px; height:125px; }
  .dest-card.active { width:128px; height:148px; }
}

/* ═══════════════════════════════════════
   COOKIE HELPERS
═══════════════════════════════════════ */
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + days * 86400000);
  document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=Lax`;
}
function getCookie(name) {
  const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return m ? decodeURIComponent(m.pop()) : '';
}
function delCookie(name) {
  document.cookie = `${name}=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/`;
}

const COOKIE_CONSENT = 'ge_cookie_consent';
const COOKIE_LAST    = 'ge_last_dest';

function acceptCookies() {
  setCookie(COOKIE_CONSENT, 'yes', 365);
  hideCookieToast();
}
function declineCookies() {
  setCookie(COOKIE_CONSENT, 'no', 30);
  hideCookieToast();
}
function hideCookieToast() {
  const t = document.getElementById('cookie-toast');
  t.classList.remove('show');
}
function checkCookieBanner() {
  if (!getCookie(COOKIE_CONSENT)) {
    setTimeout(() => document.getElementById('cookie-toast').classList.add('show'), 1800);
  }
}

/* ═══════════════════════════════════════
   BUILD DOM
═══════════════════════════════════════ */
function buildDOM() {
  const bgWrap = document.getElementById('bg-wrap');
  const strip  = document.getElementById('cards-strip');
  document.getElementById('tot-num').textContent = '/' + String(destinations.length).padStart(2,'0');

  destinations.forEach((d, i) => {
    const slide = document.createElement('div');
    slide.className = 'bg-slide' + (i===0?' active':'');
    slide.style.backgroundImage = `url(${d.img})`;
    bgWrap.appendChild(slide);

    const card = document.createElement('div');
    card.className = 'dest-card' + (i===0?' active':'');
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-img" style="background-image:url(${d.img})"></div>
      <div class="card-over"></div>
      <div class="card-dot"></div>
      <div class="card-prog" id="cp-${i}"></div>
      <div class="card-info">
        <div class="card-place">${d.name.replace('\n',' ')}</div>
        <div class="card-reg">${d.city}</div>
      </div>
    `;
    strip.appendChild(card);
  });
}

  const titleEl    = document.getElementById('dest-title');
  const descEl     = document.getElementById('dest-desc');

  const cityEl     = document.getElementById('loc-city');
  const provEl     = document.getElementById('loc-province');
  const countryEl  = document.getElementById('loc-country');
  const mapLinkEl  = document.getElementById('loc-map-link');

  const update = () => {
    regionEl.textContent    = d.region;
    titleEl.innerHTML       = d.name.replace('\n','<br>');
    descEl.textContent      = d.desc;
    discoverEl.href         = d.map;
    cityEl.textContent      = d.city;
    provEl.textContent      = d.province;
    countryEl.textContent   = d.country;
    mapLinkEl.href          = d.map;
  };

  if (animate) {
    gsap.to([regionEl, titleEl, descEl], {
      y:-18, opacity:0, duration:.25, stagger:.04,
      onComplete: () => {
        update();
        gsap.fromTo([regionEl, titleEl, descEl],
          { y:22, opacity:0 },
          { y:0, opacity:1, duration:.5, stagger:.07, ease:'power2.out' }
        );
      }
    });
    // Location badge animation
    gsap.to('#loc-badge', { opacity:0, x:-10, duration:.2, onComplete:() => {
      update();
      gsap.to('#loc-badge', { opacity:1, x:0, duration:.4, ease:'power2.out' });
    }});
  } else {
    update();
  }

  document.getElementById('cur-num').textContent = String(idx+1).padStart(2,'0');

  // Save last destination in cookie
  if (getCookie(COOKIE_CONSENT)==='yes') setCookie(COOKIE_LAST, idx, 30);
}

/* ═══════════════════════════════════════
   SWITCH SLIDE
═══════════════════════════════════════ */
function switchTo(next, fromAuto=false) {
  next = ((next % destinations.length) + destinations.length) % destinations.length;
  if (next === current || isAnim) return;
  isAnim = true;

  const prev = current; current = next;
  const bgs   = document.querySelectorAll('.bg-slide');
  const cards = document.querySelectorAll('.dest-card');

  // Zoom-from-card animation
  const targetCard = cards[current];
  const rect = targetCard.getBoundingClientRect();
  const ox = ((rect.left + rect.width/2)  / window.innerWidth  * 100).toFixed(1) + '%';
  const oy = ((rect.top  + rect.height/2) / window.innerHeight * 100).toFixed(1) + '%';

  const newBg = bgs[current];
  newBg.style.transformOrigin = `${ox} ${oy}`;
  gsap.set(newBg, { opacity:0, scale:.28 });
  newBg.classList.add('active');

  gsap.to(newBg, {
    opacity:1, scale:1, duration:.78, ease:'power3.inOut',
    onComplete: () => {
      gsap.to(bgs[prev], {
        opacity:0, scale:1.06, duration:.4, ease:'power2.in',
        onComplete: () => {
          bgs[prev].classList.remove('active');
          gsap.set(bgs[prev], { scale:1, opacity:0, transformOrigin:'center center' });
          newBg.style.transformOrigin = 'center center';
          isAnim = false;
        }
      });
    }
  });

  cards.forEach((c,i) => c.classList.toggle('active', i===current));
  gsap.set(`#cp-${prev}`, { width:'0%' });
  updatePanel(current);

  if (!fromAuto) resetAuto();
}

/* ═══════════════════════════════════════
   AUTO PLAY
═══════════════════════════════════════ */
function tickAuto(ts) {
  if (!lastTs) lastTs = ts;
  elapsed += ts - lastTs; lastTs = ts;
  const pct = Math.min(elapsed/AUTO_MS*100, 100);
  const cp = document.getElementById(`cp-${current}`);
  if (cp) cp.style.width = pct + '%';
  document.getElementById('prog-line').style.width = pct + '%';
  if (elapsed >= AUTO_MS) {
    elapsed=0; lastTs=null;
    if (cp) cp.style.width='0%';
    switchTo(current+1, true);
  }
  autoRaf = requestAnimationFrame(tickAuto);
}
function startAuto() { elapsed=0; lastTs=null; autoRaf=requestAnimationFrame(tickAuto); }
function stopAuto()  { cancelAnimationFrame(autoRaf); }
function resetAuto() {
  stopAuto();
  const cp = document.getElementById(`cp-${current}`);
  if (cp) cp.style.width='0%';
  document.getElementById('prog-line').style.width='0%';
  elapsed=0; lastTs=null;
  setTimeout(startAuto, 350);
}

/* ═══════════════════════════════════════
   CONTROLS
═══════════════════════════════════════ */
document.getElementById('btn-prev').addEventListener('click', () => switchTo(current-1));
document.getElementById('btn-next').addEventListener('click', () => switchTo(current+1));

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') switchTo(current+1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   switchTo(current-1);
});

// Wheel
let wLock=false;
document.addEventListener('wheel', e => {
  if (wLock) return; wLock=true; setTimeout(()=>wLock=false,900);
  e.deltaY>0 ? switchTo(current+1) : switchTo(current-1);
},{ passive:true });

// Card click
document.getElementById('cards-strip').addEventListener('click', e => {
  const c = e.target.closest('.dest-card');
  if (c) switchTo(parseInt(c.dataset.index));
});

// Touch: quick swipe only
(function() {
  let sx=0, sy=0, st=0;
  const HOLD=280, MIN=30;
  const el = document.getElementById('cards-section');
  el.addEventListener('touchstart', e => {
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; st=Date.now();
  },{ passive:true });
  el.addEventListener('touchend', e => {
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    const held=Date.now()-st;
    if (held>HOLD) return;
    if (Math.abs(dy)>Math.abs(dx)) return;
    if (Math.abs(dx)<MIN) return;
    dx<0 ? switchTo(current+1) : switchTo(current-1);
  },{ passive:true });
})();

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init() {
  buildDOM();

  // Restore last destination from cookie
  const lastIdx = parseInt(getCookie(COOKIE_LAST));
  if (!isNaN(lastIdx) && lastIdx>0 && lastIdx<destinations.length) {
    current = lastIdx;
    document.querySelectorAll('.bg-slide').forEach((b,i)=>b.classList.toggle('active',i===current));
    document.querySelectorAll('.dest-card').forEach((c,i)=>c.classList.toggle('active',i===current));
  }

  updatePanel(current, false);

  // Entrance
  gsap.set('#left-panel > *', { opacity:0, y:28 });
  gsap.to('#left-panel > *',  { opacity:1, y:0, duration:.85, stagger:.1, ease:'power3.out', delay:.5 });
  gsap.set('#loc-badge',      { opacity:0, x:-20 });
  gsap.to('#loc-badge',       { opacity:1, x:0, duration:.7, ease:'power3.out', delay:.9 });
  gsap.set('.dest-card',      { opacity:0, y:36, scale:.9 });
  gsap.to('.dest-card',       { opacity:1, y:0, scale:1, duration:.6, stagger:.08, ease:'back.out(1.4)', delay:.7 });

  const firstBg = document.querySelector('.bg-slide.active');
  gsap.from(firstBg, { scale:1.1, opacity:0, duration:1.6, ease:'power3.out', delay:.1 });

  startAuto();
  checkCookieBanner();
}

init();
</script>
