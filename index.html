<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Grid 30 Items</title>
<style>
  body {
    background-color: #000; /* พื้นหลังสีดำ */
    color: #fff;
    font-family: sans-serif;
    margin: 0;
    padding: 20px;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* จัดเรียง 3 คอลัมน์ */
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .product-card {
    border: 1px solid #39ff14; /* กรอบสีเขียวนีออน */
    border-radius: 8px;
    padding: 15px;
    background-color: #111;
    text-align: center;
    box-shadow: 0 0 10px rgba(57, 255, 20, 0.15);
  }

  .product-card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    background-color: #222; /* สีพื้นหลังรอโหลดรูป */
    border-radius: 4px;
    margin-bottom: 15px;
  }

  .product-info {
    margin-bottom: 15px;
  }

  .product-info p {
    margin: 5px 0;
  }

  .price {
    color: #39ff14;
    font-size: 1.2em;
    font-weight: bold;
  }

  .add-to-cart-btn {
    width: 100%;
    padding: 10px;
    background-color: #39ff14 !important; /* บังคับพื้นหลังเขียวตลอดเวลา */
    color: #000 !important; /* ตัวหนังสือสีดำให้ตัดกับปุ่ม */
    border: none;
    border-radius: 4px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .add-to-cart-btn:hover {
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
  }

  .add-to-cart-btn:active {
    transform: scale(0.95); /* เอฟเฟกต์ย่อปุ่มเวลากด โดยสีไม่เปลี่ยนเป็นดำ */
  }
</style>
</head>
