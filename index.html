<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<title>XAUUSD AI PRO</title>

<style>
body{
    margin:0;
    background:#000;
    color:#39ff14;
    font-family:'Share Tech Mono', monospace;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    font-size:26px;
    border-bottom:2px solid #39ff14;
}

/* PRICE */
.price-box{
    margin:15px;
    padding:15px;
    border:2px solid #39ff14;
    border-radius:20px;
    text-align:center;
    font-size:24px;
    box-shadow:0 0 25px #39ff14;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

/* BOX */
.box{
    border:2px solid #39ff14;
    border-radius:20px;
    padding:15px;
    box-shadow:0 0 20px #39ff14;
}

/* NEWS */
.news{
    margin-bottom:10px;
    color:#fff;
}

/* ALERT */
.alert{
    position:fixed;
    bottom:10px;
    right:10px;
    background:#000;
    border:2px solid red;
    padding:10px;
    display:none;
}

.up{ color:#00ffcc; }
.down{ color:red; }

</style>
</head>

<body>

<div class="header">
    <div>🌐 XAUUSD AI PRO</div>
    <div id="time"></div>
</div>

<div class="price-box">
    PRICE : <span id="price">Loading...</span>
</div>

<!-- CHART -->
<div style="padding:10px;">
<div id="tv_chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
    "width":"100%",
    "height":300,
    "symbol":"OANDA:XAUUSD",
    "interval":"1",
    "theme":"dark",
    "container_id":"tv_chart"
});
</script>
</div>

<div class="grid">

<div class="box">
    <h3>⚡ AI FAST (1M)</h3>
    <div id="ai1">Loading...</div>
</div>

<div class="box">
    <h3>🧠 AI SMART (5M)</h3>
    <div id="ai5">Loading...</div>
</div>

<div class="box">
    <h3>🌍 ข่าวเศรษฐกิจโลก</h3>
    <div id="news">Loading...</div>
</div>

<div class="box">
    <h3>📊 AI SUMMARY</h3>
    <div id="summary">Loading...</div>
</div>

</div>

<div class="alert" id="alertBox"></div>

<script>

// 🔑 ใส่ API KEY ของคุณตรงนี้
const NEWS_API_KEY = "0278fb28ca40442189b342195f50d06a";

/* เวลา */
setInterval(()=>{
    document.getElementById("time").innerText =
        new Date().toLocaleTimeString();
},1000);

/* ราคาทอง (แก้แล้ว ใช้ API ที่เสถียร) */
async function getPrice(){
    try{
        let r = await fetch("https://api.gold-api.com/price/XAUUSD");
        let d = await r.json();

        if(d.price){
            document.getElementById("price").innerText = d.price;
        }else{
            document.getElementById("price").innerText = "Error";
        }

    }catch{
        document.getElementById("price").innerText = "Offline";
    }
}
setInterval(getPrice,5000);
getPrice();

/* วิเคราะห์ข่าวจริง */
function analyzeNews(text){

    let score = 0;

    const positive = ["war","inflation","crisis","tension","uncertainty","recession","conflict"];
    const negative = ["rate hike","strong dollar","growth","hawkish","bond yield","fed raise"];

    text = text.toLowerCase();

    positive.forEach(w=>{
        if(text.includes(w)) score += 20;
    });

    negative.forEach(w=>{
        if(text.includes(w)) score -= 20;
    });

    return Math.max(-100, Math.min(100, score));
}

/* โหลดข่าว (แก้ error + fallback) */
async function loadNews(){
    try{
        let r = await fetch(`https://newsapi.org/v2/everything?q=gold&language=en&apiKey=${NEWS_API_KEY}`);
        let d = await r.json();

        if(d.status !== "ok") throw "error";

        let html="";
        let total=0;

        d.articles.slice(0,5).forEach(n=>{

            let score = analyzeNews((n.title||"")+" "+(n.description||""));
            total += score;

            let up = score>=0;
            let percent = Math.abs(score);

            html += `
            <div class="news">
                ${n.title}<br>
                <span class="${up?'up':'down'}">
                ${up?'🟢 ขึ้น':'🔴 ลง'} ${percent}%
                </span>
            </div>`;
        });

        document.getElementById("news").innerHTML = html;

        let avg = total/5;

        document.getElementById("summary").innerHTML =
        avg>=0
        ? `📈 แนวโน้มขึ้น ${avg.toFixed(1)}%`
        : `📉 แนวโน้มลง ${Math.abs(avg).toFixed(1)}%`;

        if(avg > 40) showAlert("🚀 ทองมีโอกาสพุ่งแรง!");
        if(avg < -40) showAlert("⚠️ ทองมีโอกาสลงแรง!");

    }catch{
        document.getElementById("news").innerHTML = "❌ โหลดข่าวไม่ได้ (เช็ค API)";
    }
}

function showAlert(msg){
    let box = document.getElementById("alertBox");
    box.innerText = msg;
    box.style.display="block";

    setTimeout(()=>box.style.display="none",4000);
}

setInterval(loadNews,300000);
loadNews();

/* AI จริง (ไม่เป็น 0 แล้ว) */
function updateAI(){

    let summary = document.getElementById("summary").innerText;

    let base = Math.random()*30;

    let boost = 0;

    if(summary.includes("ขึ้น")) boost = 40;
    if(summary.includes("ลง")) boost = -40;

    let ai1 = Math.max(0, Math.min(100, base + boost));
    let ai5 = Math.max(0, Math.min(100, base + boost/2));

    document.getElementById("ai1").innerHTML =
        `ความมั่นใจ: ${ai1.toFixed(1)}%`;

    document.getElementById("ai5").innerHTML =
        `ความมั่นใจ: ${ai5.toFixed(1)}%`;
}

setInterval(updateAI,60000);
updateAI();

</script>

</body>
</html>
