<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greencat Premium - Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #39ff14; --neon-glow: rgba(57, 255, 20, 0.4); --gold: #ffd700; }
        body { background-color: #000; color: #fff; font-family: 'Kanit', sans-serif; touch-action: manipulation; }
        .neon-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.95); border: 1px solid #222; border-radius: 20px; }
        
        /* สไตล์สินค้า 3 แถว */
        .product-card { background: #0f0f0f; border: 1px solid #1a1a1a; padding: 6px; border-radius: 12px; text-align: center; }
        .size-btn { font-size: 9px; padding: 2px 4px; border: 1px solid #333; border-radius: 4px; cursor: pointer; }
        .size-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(57, 255, 20, 0.1); }

        /* หน้าจอ */
        .page { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* กระดานสุ่ม 30 ช่อง (Mobile Version) */
        .monopoly-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 4px; width: 100%; max-width: 350px; margin: auto; aspect-ratio: 1/1;
        }
        .slot { background: #111; border: 1px solid #222; border-radius: 4px; font-size: 7px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slot.active-slot { border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); background: var(--neon); color: #000; font-weight: bold; }

        /* VIP Aura */
        .vip-aura { position: relative; }
        .vip-aura::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        input, textarea { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; padding: 12px; width: 100%; focus: outline-none; focus: border-color: var(--neon); }
    </style>
</head>
<body>

    <div id="page-login" class="page active flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center border-t-4 border-lime-500">
            <h1 class="neon-font text-3xl mb-8 tracking-tighter text-lime-400">GREENCAT</h1>
            <div class="flex mb-6 bg-zinc-900 p-1 rounded-xl text-sm">
                <button onclick="toggleAuth('login')" id="tab-login" class="flex-1 py-2 rounded-lg bg-zinc-800 text-white font-bold">LOGIN</button>
                <button onclick="toggleAuth('reg')" id="tab-reg" class="flex-1 py-2 rounded-lg text-zinc-500">REGISTER</button>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email">
                <div class="relative">
                    <input type="password" id="auth-pass" placeholder="Password">
                    <i class="fa-solid fa-eye absolute right-4 top-4 text-zinc-500" onclick="togglePass()"></i>
                </div>
                <button id="btn-auth" onclick="handleAuth()" class="w-full py-4 bg-lime-500 text-black font-bold rounded-xl shadow-lg shadow-lime-500/20 mt-4 transition active:scale-95">CONFIRM</button>
            </div>
            <p id="auth-error" class="text-red-500 text-xs mt-4 hidden"></p>
        </div>
    </div>

    <div id="page-shop" class="page bg-black">
        <nav class="p-4 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-40 border-b border-zinc-900">
            <h2 class="neon-font text-xl text-lime-400">GREENCAT</h2>
            <div class="flex gap-3">
                <button onclick="showPage('page-profile')" class="relative"><i class="fa-solid fa-user-circle text-2xl"></i></button>
                <button onclick="showPage('page-cart')" class="relative bg-zinc-900 px-3 py-1 rounded-lg text-sm border border-zinc-800">🛒 <span id="cart-count">0</span></button>
            </div>
        </nav>

        <div class="p-3">
            <div class="w-full bg-zinc-900/50 rounded-xl p-3 mb-4 border-l-4 border-lime-500">
                <marquee class="text-[10px] font-bold text-lime-400 uppercase tracking-widest">ยินดีต้อนรับเข้าสู่ระบบ VIP - ช้อปครบ 100,000 รับกรอบทองทันที!</marquee>
            </div>
            <div class="grid grid-cols-3 gap-2" id="product-grid"></div>
        </div>

        <button onclick="showPage('page-game')" class="fixed bottom-6 right-6 w-14 h-14 bg-lime-500 text-black rounded-full shadow-2xl flex items-center justify-center animate-bounce z-50">
            <i class="fa-solid fa-dice text-xl"></i>
        </button>
    </div>

    <div id="page-profile" class="page p-6">
        <button onclick="showPage('page-shop')" class="text-zinc-500 mb-6 block"><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div class="glass p-6 text-center">
            <div class="relative inline-block mb-4">
                <div id="prof-aura-box" class="w-24 h-24 rounded-full overflow-hidden border-2 border-zinc-800">
                    <img id="display-pic" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                </div>
                <label for="img-upload" class="absolute bottom-0 right-0 bg-lime-500 text-black w-8 h-8 rounded-full flex items-center justify-center border-2 border-black cursor-pointer">
                    <i class="fa-solid fa-camera text-xs"></i>
                </label>
                <input type="file" id="img-upload" class="hidden" accept="image/*" onchange="uploadProfileImg(this)">
            </div>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] text-zinc-500 ml-2">Display Name</label>
                    <input type="text" id="prof-name" placeholder="ชื่อของคุณ">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 ml-2">Shipping Address</label>
                    <textarea id="prof-address" class="h-20" placeholder="บ้านเลขที่, ถนน, แขวง..."></textarea>
                </div>
                <div class="bg-black p-4 rounded-xl border border-zinc-800">
                    <p class="text-[10px] text-zinc-500">ยอดสะสม VIP</p>
                    <p id="prof-spent" class="text-lime-400 font-bold">0 / 100,000 ฿</p>
                    <div class="w-full bg-zinc-800 h-1.5 rounded-full mt-2 overflow-hidden">
                        <div id="prof-progress" class="bg-lime-500 h-full w-0"></div>
                    </div>
                </div>
                <button onclick="saveProfileData()" class="w-full py-4 bg-lime-500 text-black font-bold rounded-xl transition active:scale-95">SAVE CHANGES</button>
                <button onclick="logout()" class="w-full py-2 text-red-500 text-sm font-bold">LOGOUT</button>
            </div>
        </div>
    </div>

    <div id="page-game" class="page p-4 text-center">
        <button onclick="showPage('page-shop')" class="float-left text-zinc-500 mt-2"><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <h2 class="neon-font text-xl text-lime-400 mt-12 mb-8 uppercase">Lucky Board</h2>
        <div class="monopoly-board" id="game-board"></div>
        <div class="mt-12">
            <button id="btn-spin" onclick="playGame()" class="px-10 py-4 bg-lime-500 text-black font-bold rounded-xl shadow-lg shadow-lime-500/30">START SPIN</button>
        </div>
    </div>

    <div id="page-cart" class="page p-6">
        <button onclick="showPage('page-shop')" class="text-zinc-500 mb-6 block"><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div class="glass p-6">
            <h3 class="font-bold mb-4 border-b border-zinc-800 pb-2">รายการของคุณ</h3>
            <div id="cart-items" class="space-y-3 mb-6"></div>
            <div class="flex justify-between font-bold text-xl mb-6">
                <span>ยอดรวม:</span>
                <span id="cart-total-val" class="text-lime-400">0 ฿</span>
            </div>
            <p class="text-[10px] text-zinc-500 mb-2 italic">แนบสลิปเพื่อยืนยันออเดอร์และสะสมยอด VIP</p>
            <input type="file" id="slip-upload" class="text-xs mb-6">
            <button onclick="confirmOrder()" class="w-full py-4 bg-lime-500 text-black font-bold rounded-xl">CHECKOUT NOW</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Firebase Config จากผู้ใช้
        const firebaseConfig = {
          apiKey: "AIzaSyA9SqXG_HpkEj9mZXAzQnG8Oh9c5CiDNQ4",
          authDomain: "greencat-d6419.firebaseapp.com",
          projectId: "greencat-d6419",
          storageBucket: "greencat-d6419.firebasestorage.app",
          messagingSenderId: "1039922914232",
          appId: "1:1039922914232:web:5271fcd79d932b762ee54d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let cart = [];
        let authMode = 'login';

        // --- AUTH LOGIC ---
        window.toggleAuth = (mode) => {
            authMode = mode;
            document.getElementById('tab-login').className = mode === 'login' ? "flex-1 py-2 rounded-lg bg-zinc-800 text-white font-bold" : "flex-1 py-2 rounded-lg text-zinc-500";
            document.getElementById('tab-reg').className = mode === 'reg' ? "flex-1 py-2 rounded-lg bg-zinc-800 text-white font-bold" : "flex-1 py-2 rounded-lg text-zinc-500";
            document.getElementById('btn-auth').innerText = mode === 'login' ? "CONFIRM LOGIN" : "CREATE ACCOUNT";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const err = document.getElementById('auth-error');
            err.classList.add('hidden');

            try {
                if(authMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), {
                        name: "New Player",
                        address: "",
                        totalSpent: 0,
                        profileImg: ""
                    });
                }
            } catch (error) {
                err.innerText = error.message;
                err.classList.remove('hidden');
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await syncProfile();
                window.showPage('page-shop');
            } else {
                currentUser = null;
                window.showPage('page-login');
            }
        });

        // --- PROFILE LOGIC ---
        async function syncProfile() {
            if(!currentUser) return;
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            if(snap.exists()) {
                const data = snap.data();
                document.getElementById('prof-name').value = data.name || "";
                document.getElementById('prof-address').value = data.address || "";
                document.getElementById('display-pic').src = data.profileImg || "https://api.dicebear.com/7.x/avataaars/svg?seed="+currentUser.uid;
                
                const spent = data.totalSpent || 0;
                document.getElementById('prof-spent').innerText = `${spent.toLocaleString()} / 100,000 ฿`;
                document.getElementById('prof-progress').style.width = Math.min((spent/100000)*100, 100) + "%";
                
                // VIP Check
                if(spent >= 100000) {
                    document.getElementById('prof-aura-box').classList.add('vip-aura');
                } else {
                    document.getElementById('prof-aura-box').classList.remove('vip-aura');
                }
            }
        }

        window.saveProfileData = async () => {
            const name = document.getElementById('prof-name').value;
            const address = document.getElementById('prof-address').value;
            await updateDoc(doc(db, "users", currentUser.uid), { name, address });
            alert("บันทึกข้อมูลสำเร็จ!");
        };

        window.uploadProfileImg = async (input) => {
            if(!input.files[0]) return;
            const file = input.files[0];
            const fileRef = ref(storage, `profiles/${currentUser.uid}`);
            await uploadBytes(fileRef, file);
            const url = await getDownloadURL(fileRef);
            await updateDoc(doc(db, "users", currentUser.uid), { profileImg: url });
            document.getElementById('display-pic').src = url;
            alert("อัปโหลดรูปสำเร็จ!");
        };

        // --- SHOP LOGIC (3 แถว) ---
        const products = Array.from({length: 30}, (_, i) => ({ id: i, name: `GC Product ${i+1}` }));
        const grid = document.getElementById('product-grid');
        let selectedSizes = {};

        products.forEach(p => {
            selectedSizes[p.id] = 400; // default 25g
            grid.innerHTML += `
                <div class="product-card">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${p.id+20}" class="w-full aspect-square rounded mb-2 bg-zinc-900">
                    <p class="text-[8px] font-bold truncate mb-2">${p.name}</p>
                    <div class="flex justify-between gap-0.5 mb-2">
                        <button onclick="pickSize(${p.id}, 400, this)" class="size-btn active">25g</button>
                        <button onclick="pickSize(${p.id}, 700, this)" class="size-btn">50g</button>
                        <button onclick="pickSize(${p.id}, 1200, this)" class="size-btn">100g</button>
                    </div>
                    <button onclick="buyNow(${p.id})" class="w-full py-1.5 bg-zinc-800 text-[9px] rounded font-bold hover:bg-lime-500 hover:text-black">ADD</button>
                </div>
            `;
        });

        window.pickSize = (id, price, btn) => {
            const parent = btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSizes[id] = price;
        };

        window.buyNow = (id) => {
            cart.push({ id, price: selectedSizes[id], name: `GC Item #${id+1}` });
            document.getElementById('cart-count').innerText = cart.length;
            updateCartUI();
        };

        function updateCartUI() {
            const cont = document.getElementById('cart-items');
            cont.innerHTML = '';
            let total = 0;
            cart.forEach((c, idx) => {
                total += c.price;
                cont.innerHTML += `<div class="flex justify-between text-xs bg-zinc-900 p-2 rounded"><span>${c.name}</span><span>${c.price}฿</span></div>`;
            });
            document.getElementById('cart-total-val').innerText = total + " ฿";
        }

        window.confirmOrder = async () => {
            if(cart.length === 0) return alert("ตะกร้าว่างเปล่า!");
            const total = cart.reduce((a,b) => a+b.price, 0);
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            const currentSpent = snap.data().totalSpent || 0;
            await updateDoc(doc(db, "users", currentUser.uid), { totalSpent: currentSpent + total });
            alert("สั่งซื้อสำเร็จ! ยอดสะสม VIP ของคุณถูกอัปเดตแล้ว");
            cart = [];
            document.getElementById('cart-count').innerText = 0;
            updateCartUI();
            await syncProfile();
            window.showPage('page-shop');
        };

        // --- LUCKY BOARD LOGIC (30 Slots) ---
        const boardCont = document.getElementById('game-board');
        const slots = [
            1,2,3,4,5,6,7,8, // Top
            14, // Right side
            19,
            24,
            29,
            30,28,27,26,25,23,22,21, // Bottom
            16, // Left side
            11,
            9,
            12, 13, 15, 17, 18, 20, 10 // Fillers to reach 30
        ];
        
        // เราใช้ Grid Area ในการจัดวาง 30 ช่องให้วนรอบจอ
        for(let i=1; i<=30; i++) {
            let label = i === 1 ? "START" : (i%5===0 ? "FREE" : "GC "+i);
            boardCont.innerHTML += `<div class="slot" id="slot-${i}">${label}</div>`;
        }

        window.playGame = () => {
            let current = 1;
            let target = Math.floor(Math.random() * 30) + 60;
            let speed = 50;
            document.getElementById('btn-spin').disabled = true;

            function run() {
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-slot'));
                let visualPos = (current % 30) || 30;
                document.getElementById(`slot-${visualPos}`).classList.add('active-slot');
                
                if(current < target) {
                    current++;
                    if(target - current < 10) speed += 30;
                    setTimeout(run, speed);
                } else {
                    document.getElementById('btn-spin').disabled = false;
                    alert("ยินดีด้วย! คุณได้รับรางวัลในช่องที่ " + visualPos);
                }
            }
            run();
        };

        // --- GLOBAL UI ---
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        };

        window.togglePass = () => {
            const p = document.getElementById('auth-pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        };

    </script>
</body>
</html>
