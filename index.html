<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<title>XAUUSD AI PRO</title>

<style>
body{
    margin:0;
    background:#000;
    color:#39ff14;
    font-family:'Share Tech Mono', monospace;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    font-size:26px;
    border-bottom:2px solid #39ff14;
}

/* PRICE */
.price-box{
    margin:15px;
    padding:15px;
    border:2px solid #39ff14;
    border-radius:20px;
    text-align:center;
    font-size:24px;
    box-shadow:0 0 25px #39ff14;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

/* BOX */
.box{
    border:2px solid #39ff14;
    border-radius:20px;
    padding:15px;
    box-shadow:0 0 20px #39ff14;
}

/* สี */
.buy{ color:#00ffcc; }
.sell{ color:red; }

</style>
</head>

<body>

<div class="header">
    <div>🌐 XAUUSD AI PRO</div>
    <div id="time"></div>
</div>

<div class="price-box">
    PRICE : <span id="price">Loading...</span>
</div>

<!-- CHART -->
<div style="padding:10px;">
<div id="tv_chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
    "width":"100%",
    "height":300,
    "symbol":"OANDA:XAUUSD",
    "interval":"1",
    "theme":"dark",
    "container_id":"tv_chart"
});
</script>
</div>

<div class="grid">

<div class="box">
    <h3>⚡ AI FAST (1M)</h3>
    <div id="ai1"></div>
</div>

<div class="box">
    <h3>🧠 AI SMART (5M)</h3>
    <div id="ai5"></div>
</div>

<div class="box">
    <h3>🌍 ข่าวเศรษฐกิจโลก</h3>
    <div id="news">Loading...</div>
</div>

<div class="box">
    <h3>📊 AI SUMMARY</h3>
    <div id="summary"></div>
</div>

</div>

<script>

// 🔑 API NEWS (ใช้ของคุณ)
const API_KEY = "0278fb28ca40442189b342195f50d06a";

/* เวลา */
setInterval(()=>{
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
},1000);

/* ราคาทอง */
let currentPrice = 0;

async function getPrice(){
    try{
        let r = await fetch("https://api.gold-api.com/price/XAUUSD");
        let d = await r.json();

        currentPrice = d.price;
        document.getElementById("price").innerText = d.price;

    }catch{
        document.getElementById("price").innerText = "Offline";
    }
}
setInterval(getPrice,5000);
getPrice();

/* วิเคราะห์ข่าว */
function analyze(text){
    let score = 0;

    const up = ["war","inflation","crisis","tension","conflict"];
    const down = ["rate hike","fed","strong dollar","bond yield"];

    text = text.toLowerCase();

    up.forEach(w=>{ if(text.includes(w)) score+=20; });
    down.forEach(w=>{ if(text.includes(w)) score-=20; });

    return score;
}

/* ข่าว */
async function loadNews(){
    try{
        let r = await fetch(`https://newsapi.org/v2/everything?q=gold&apiKey=${API_KEY}`);
        let d = await r.json();

        let html="";
        let total=0;

        d.articles.slice(0,5).forEach(n=>{
            let s = analyze((n.title||"")+" "+(n.description||""));
            total += s;

            html += `
            <div>
            ${n.title}<br>
            <span class="${s>=0?'buy':'sell'}">
            ${s>=0?'🔵 ขึ้น':'🔴 ลง'} ${Math.abs(s)}%
            </span>
            </div><br>`;
        });

        document.getElementById("news").innerHTML = html;

        window.marketScore = total/5;

    }catch{
        document.getElementById("news").innerHTML="❌ API โดนบล็อก";
        window.marketScore = 0;
    }
}
setInterval(loadNews,300000);
loadNews();

/* AI + TP SL */
function calcAI(){

    let base = Math.random()*30;
    let trend = window.marketScore || 0;

    let final = base + trend;

    let signal = final >= 0 ? "BUY" : "SELL";
    let confidence = Math.abs(final);

    let entry = currentPrice;

    let tp = signal==="BUY"
        ? entry + (confidence * 0.5)
        : entry - (confidence * 0.5);

    let sl = signal==="BUY"
        ? entry - (confidence * 0.3)
        : entry + (confidence * 0.3);

    return {
        signal,
        confidence,
        entry,
        tp,
        sl
    };
}

/* อัพเดต AI */
function updateAI(){

    let ai1 = calcAI();
    let ai5 = calcAI();

    document.getElementById("ai1").innerHTML = `
    สัญญาณ: <span class="${ai1.signal==='BUY'?'buy':'sell'}">${ai1.signal}</span><br>
    ความมั่นใจ: ${ai1.confidence.toFixed(1)}%<br>
    Entry: ${ai1.entry}<br>
    TP: ${ai1.tp.toFixed(2)}<br>
    SL: ${ai1.sl.toFixed(2)}
    `;

    document.getElementById("ai5").innerHTML = `
    สัญญาณ: <span class="${ai5.signal==='BUY'?'buy':'sell'}">${ai5.signal}</span><br>
    ความมั่นใจ: ${ai5.confidence.toFixed(1)}%<br>
    Entry: ${ai5.entry}<br>
    TP: ${ai5.tp.toFixed(2)}<br>
    SL: ${ai5.sl.toFixed(2)}
    `;

    document.getElementById("summary").innerHTML =
    ai5.signal==="BUY"
    ? `🔵 แนวโน้มขึ้น`
    : `🔴 แนวโน้มลง`;

}

setInterval(updateAI,60000);
updateAI();

</script>

</body>
</html>
