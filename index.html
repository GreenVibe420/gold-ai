<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Auto</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
.product{background:#1e293b;padding:10px;border-radius:10px;text-align:center}
.product img{width:100%;height:80px;object-fit:cover;border-radius:8px}
.admin{background:#111827;padding:10px;margin-top:5px;border-radius:8px}
button{margin:5px;padding:8px;border:none;border-radius:6px;background:#22c55e;color:#fff}
input{width:100%;margin:3px 0;padding:5px;border-radius:6px;border:none}
.empty{opacity:0.3}
</style>
</head>

<body>

<h2 style="text-align:center">ร้านค้า</h2>

<div style="text-align:center">
  <button onclick="toggleAdmin()">โหมดแอดมิน</button>
</div>

<div id="products" class="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "ใส่ของคุณ",
  authDomain: "ใส่ของคุณ",
  projectId: "ใส่ของคุณ",
  storageBucket: "ใส่ของคุณ",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const storage = getStorage();

let admin = false;

window.toggleAdmin = ()=>{
  admin = !admin;
  loadProducts();
}

async function loadProducts(){
  const div = document.getElementById("products");
  div.innerHTML="";

  for(let i=1;i<=30;i++){
    const id = "product"+i;

    let data = {
      name:"",
      price25:"",
      price50:"",
      price100:"",
      image:""
    };

    const snap = await getDoc(doc(db,"products",id));
    if(snap.exists()){
      data = snap.data();
    }

    const el = document.createElement("div");
    el.className="product";

    if(!data.name){
      el.classList.add("empty");
    }

    el.innerHTML = `
      <img src="${data.image || 'https://via.placeholder.com/150'}">
      <h4>${data.name || 'ยังไม่มีสินค้า'}</h4>
      25g ${data.price25 || '-'}฿<br>
      50g ${data.price50 || '-'}฿<br>
      100g ${data.price100 || '-'}฿
    `;

    if(admin){
      const box = document.createElement("div");
      box.className="admin";

      box.innerHTML = `
        <input id="name${i}" placeholder="ชื่อสินค้า" value="${data.name}">
        <input id="p25${i}" placeholder="25g" value="${data.price25}">
        <input id="p50${i}" placeholder="50g" value="${data.price50}">
        <input id="p100${i}" placeholder="100g" value="${data.price100}">
        <input type="file" id="file${i}">
        <button onclick="save(${i})">บันทึก</button>
      `;

      el.appendChild(box);
    }

    div.appendChild(el);
  }
}

window.save = async (i)=>{
  const id="product"+i;

  const name = document.getElementById("name"+i).value;
  const p25 = document.getElementById("p25"+i).value;
  const p50 = document.getElementById("p50"+i).value;
  const p100 = document.getElementById("p100"+i).value;

  let imageUrl="";

  const file = document.getElementById("file"+i).files[0];
  if(file){
    const storageRef = ref(storage,"products/"+id);
    await uploadBytes(storageRef,file);
    imageUrl = await getDownloadURL(storageRef);
  }

  const data = {
    name,
    price25,
    price50,
    price100
  };

  if(imageUrl) data.image = imageUrl;

  await setDoc(doc(db,"products",id),data);

  alert("บันทึกแล้ว");
  loadProducts();
}

loadProducts();

</script>

</body>
</html>
