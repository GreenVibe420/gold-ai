<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กัญชาบ่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #39ff14; --bg-dark: #050505; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-dark); color: white; overflow-x: hidden; user-select: none; }
        .text-neon { color: var(--neon); text-shadow: 0 0 10px rgba(57, 255, 20, 0.7); }
        .bg-neon { background-color: var(--neon); box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); color: #000; }
        .border-neon { border-color: var(--neon); box-shadow: 0 0 5px rgba(57, 255, 20, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Grid 3 คอลัมน์ สำหรับ 30 สินค้า */
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        header { position: sticky; top: 0; z-index: 50; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(57, 255, 20, 0.2); }
        
        .sticky-footer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 50; }
        .glass-panel { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(57, 255, 20, 0.2); }
        .size-btn.active { background-color: rgba(57, 255, 20, 0.15); border-color: var(--neon); color: var(--neon); }
        
        input, textarea { background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

        #smoke-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; filter: blur(8px); opacity: 0.6; }
        
        /* Ad Button & Modal */
        .promo-btn {
            position: fixed; right: 20px; bottom: 180px; width: 60px; height: 60px;
            border-radius: 50%; background: var(--neon); color: black;
            display: flex; align-items: center; justify-content: center; z-index: 60;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); animation: float 3s ease-in-out infinite;
            cursor: pointer; border: 2px solid white;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px; cursor: pointer; }
        .ad-content { max-width: 400px; width: 100%; position: relative; }
        
        .social-link { font-size: 24px; transition: 0.3s; color: #fff; }
        .social-link:hover { color: var(--neon); transform: scale(1.2); }
        
        .fade-slide { animation: fade 0.5s ease-in-out; }
        @keyframes fade { from { opacity: 0.4; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="pb-48">
    <canvas id="smoke-canvas"></canvas>

                <div id="ad-render-area" class="fade-slide"></div>
            </div>
            <div id="ad-dots" class="flex justify-center gap-2 mt-4"></div>
        </div>

        </div>

                <button onclick="changeLang('en')" class="w-6 h-6 rounded-full bg-black border border-gray-700 hover:border-neon transition flex items-center justify-center text-xs shadow-md">🇬🇧</button>

    </header>

    <main class="p-3">
        <div id="product-list" class="product-grid"></div>
    </main>

    <div class="sticky-footer glass-panel p-4 shadow-[0_-10px_40px_rgba(0,0,0,0.9)]">
        <div id="cart-items" class="flex gap-2 overflow-x-auto no-scrollbar mb-3 py-1 min-h-[40px] items-center">
            <span id="empty-cart-msg" class="text-gray-600 text-sm italic">ยังไม่มีสินค้าในตะกร้า...</span>
        </div>
        <div class="flex justify-between items-center">
            <div>
                <p id="total-label" class="text-gray-400 text-[10px] mb-0 uppercase tracking-tighter">ยอดรวมทั้งหมด</p>
                <p class="text-2xl font-bold text-neon leading-none">฿ <span id="total-price">0</span></p>
            </div>
            <div class="flex gap-2">
                <button id="clear-btn" onclick="clearCart()" class="text-red-500 bg-black border border-red-900/50 px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition">ลบทั้งหมด</button>
                <button id="checkout-btn" onclick="openCheckout()" class="bg-neon px-8 py-2 rounded-xl font-extrabold text-md active:scale-95 transition text-black shadow-lg shadow-green-500/20">ชำระเงิน</button>
            </div>
        </div>
    </div>

    ยืนยันออเดอร์และส่ง LINE
</button>

    <script>
        // ==========================================
        // ส่วนที่ 1: ตั้งค่าโฆษณา

        const adsData = [
            { img: "https://i.postimg.cc/8PdzFd35/108583552-32d208b5-3b6a-4bdb-aecc-299ff7bf622f.jpg", title: "โปรโมชั่นประจำเดือน!", desc: "ซื้อครบ 1,000.- รับฟรีสายพันธุ์ลับ 2g" },
            { img: "https://i.postimg.cc/d1jR1Z8j/images-(1).jpg", title: "ลดแหลกแจกแถม!", desc: "ลดราคาสูงสุดถึง 10% 🎉" }
        ];

        let currentAdIndex = 0;
        let adInterval;

        function renderAd() {
            const adArea = document.getElementById('ad-render-area');
            const adDots = document.getElementById('ad-dots');
            const ad = adsData[currentAdIndex];
            
            adArea.classList.remove('fade-slide');
            void adArea.offsetWidth;
            adArea.classList.add('fade-slide');

            adArea.innerHTML = `
                <img src="${ad.img}" class="w-full h-[400px] object-cover">
                <div class="p-4 bg-black/90 text-center">
                    <h3 class="text-neon font-bold text-xl">${ad.title}</h3>
                    <p class="text-gray-300 text-sm mt-1">${ad.desc}</p>
                </div>
            `;

            adDots.innerHTML = adsData.map((_, index) => `<div class="w-2 h-2 rounded-full transition-all ${index === currentAdIndex ? 'bg-neon w-4' : 'bg-gray-600'}"></div>`).join('');
        }

        function nextAd() {
            currentAdIndex = (currentAdIndex + 1) % adsData.length;
            renderAd();
        }

        function openAd() { 
            document.getElementById('ad-modal').style.display = 'flex'; 
            renderAd();
            clearInterval(adInterval);
            adInterval = setInterval(nextAd, 4000); 
        }
        
        function closeAd() { 
            document.getElementById('ad-modal').style.display = 'none'; 
            clearInterval(adInterval);
        }

        // ==========================================
        // ส่วนที่ 2: ข้อมูลสินค้า 30 รายการ
        // ==========================================
        const productsData = [
            { id: 1, name: "Strain #1", stock: 9999, img: "https://i.postimg.cc/8PdzFd35/108583552-32d208b5-3b6a-4bdb-aecc-299ff7bf622f.jpg", prices: { "25g": 400, "50g": 1100, "100g": 1800 } },
            { id: 2, name: "Strain #2", stock: 5555, img: "https://i.postimg.cc/ZYLT48Mj/Gemini-Generated-Image-sgwjy4sgwjy4sgwj.png", prices: { "25g": 400, "50g": 1100, "100g": 1800 } },
            { id: 3, name: "Strain #3", stock: 4444, img: "https://i.postimg.cc/7PXypxC8/images-(2).jpg", prices: { "25g": 400, "50g": 1100, "100g": 1800 } },
            { id: 4, name: "Strain #4", stock: 10, img: "https://i.postimg.cc/y6LwLvG2/images.jpg", prices: { "25g": 400, "50g": 1100, "100g": 1800 } },
            { id: 5, name: "Strain #5", stock: 10, img: "https://i.postimg.cc/d3q194L9/images-(9).jpg", prices: { "25g": 400, "50g": 1100, "100g": 1800 } },
            { id: 6, name: "Strain #6", stock: 10, img: "https://i.postimg.cc/2SPStz1W/images-(8).jpg", prices: { "25g": 400, "50g": 1100, "100g": 1800 } },

            { id: 16, name: "Strain #16", stock: 10, img: "ใส่รูปที่นี่.jpg", prices: { "1g": 400, "3g": 1100, "5g": 1800 } },

            { id: 18, name: "Strain #18", stock: 10, img: "ใส่รูปที่นี่.jpg", prices: { "1g": 400, "3g": 1100, "5g": 1800 } },

        ];

        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 50 + 30;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1 - 0.5;
                this.opacity = 0.2;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.000; }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#666'; ctx.fill(); ctx.restore();
            }
        }
        function createSmoke(e) {
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            for(let i=0; i<2; i++) particles.push(new Particle(x, y));
        }
        window.addEventListener('mousemove', createSmoke);
        window.addEventListener('touchmove', createSmoke);
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.opacity<=0) particles.splice(i,1); });
            requestAnimationFrame(animate);
        }
        animate();

        const i18n = {
            th: { tap: "แตะเพื่อเข้าสู่ระบบ", stock: "สินค้าทั้งหมด", total: "Total Price", clear: "ล้าง", checkout: "ชำระเงิน", back: "← ย้อนกลับ", summary: "สรุปออเดอร์", addr: "ข้อมูลจัดส่ง", scan: "สแกนเพื่อชำระเงิน", net: "ยอดสุทธิ:", confirm: "ยืนยันออเดอร์และส่ง LINE", empty: "ยังไม่มีสินค้าในตะกร้า...", name: "ชื่อผู้รับ", tel: "เบอร์โทรศัพท์", address: "ที่อยู่โดยละเอียด", addCart: "+ ใส่ตะกร้า" },
            en: { tap: "Tap to Enter", stock: "Total Items", total: "Total Price", clear: "Clear", checkout: "Checkout", back: "← Back", summary: "Summary", addr: "Shipping Info", scan: "Scan to Pay", net: "Net Total:", confirm: "Confirm & Send to LINE", empty: "Cart is empty...", name: "Full Name", tel: "Phone", address: "Address", addCart: "+ Add" },
            cn: { tap: "点击进入", stock: "全部商品", total: "总金额", clear: "清除", checkout: "結帳", back: "← 返回", summary: "結帳明細", addr: "收货信息", scan: "掃碼付款", net: "净计:", confirm: "確認並發送到 LINE", empty: "购物车是空的...", name: "姓名", tel: "电话", address: "地址", addCart: "+ 加入" }
        };

        let currentLang = 'th';
        let cart = [];
        let selectedSizes = {};
        
        productsData.forEach(p => { 
            selectedSizes[p.id] = Object.keys(p.prices)[0]; 
        });

        function enterShop() {
            const cover = document.getElementById('cover-page');
            cover.style.opacity = '0';
            setTimeout(() => { cover.style.display = 'none'; }, 500);
            setTimeout(openAd, 1000);
        }

        function changeLang(lang) {
            currentLang = lang;
            const t = i18n[lang];
            document.getElementById('tap-to-enter').innerText = t.tap;
            document.getElementById('stock-count').innerText = `${productsData.length} ${t.stock}`;
            document.getElementById('total-label').innerText = t.total;
            document.getElementById('clear-btn').innerText = t.clear;
            document.getElementById('checkout-btn').innerText = t.checkout;
            document.getElementById('back-btn').innerText = t.back;
            document.getElementById('summary-label').innerText = t.summary;
            document.getElementById('addr-label').innerHTML = `<i class="fa-solid fa-truck"></i> ${t.addr}`;
            document.getElementById('scan-label').innerText = t.scan;
            document.getElementById('net-label').innerText = t.net;
            document.getElementById('confirm-btn').innerText = t.confirm;
            document.getElementById('cust-name').placeholder = t.name;
            document.getElementById('cust-tel').placeholder = t.tel;
            document.getElementById('cust-addr').placeholder = t.address;
            renderProducts(); updateUI();
        }

        function renderProducts() {
            const container = document.getElementById('product-list');
            document.getElementById('stock-count').innerText = `${productsData.length} ${i18n[currentLang].stock}`;
            
            container.innerHTML = productsData.map(p => {
                const currentSize = selectedSizes[p.id];
                const availableSizes = Object.keys(p.prices);
                
                const imgSrc = p.img.includes('ใส่รูป') ? 'https://via.placeholder.com/200/111111/39ff14?text=NO+IMAGE' : p.img;

                return `
                <div class="bg-[#0f0f0f] rounded-2xl p-2 border border-gray-800 flex flex-col relative overflow-hidden shadow-lg transition hover:border-neon/50">
                    <div class="relative mb-2">
                        <img src="${imgSrc}" class="w-full h-24 object-cover rounded-xl border border-gray-800 bg-[#111]">
                        <div class="absolute top-1 right-1 bg-black/80 px-2 py-0.5 rounded text-[8px] text-gray-300">คลัง: <span class="text-neon">${p.stock}</span></div>
                    </div>
                    <h3 class="text-[10px] font-bold truncate text-gray-200 mb-1 px-1 uppercase">${p.name}</h3>
                    <p class="text-neon font-bold text-xs mb-2 text-center" id="price-display-${p.id}">฿${p.prices[currentSize].toLocaleString()}</p>
                    <div class="flex gap-1 mb-2 bg-black p-1 rounded-lg">
                        ${availableSizes.map(size => `
                            <button onclick="changeSize(${p.id}, '${size}')" class="size-btn flex-1 text-[8px] py-1 rounded-md text-gray-500 ${currentSize === size ? 'active' : ''}">${size}</button>
                        `).join('')}
                    </div>
                    <button onclick="addToCart(${p.id})" class="w-full border border-neon/30 bg-transparent text-neon text-[10px] font-bold py-1.5 rounded-lg active:scale-95 transition hover:bg-neon hover:text-black">${i18n[currentLang].addCart}</button>
                </div>
            `}).join('');
        }

        function changeSize(productId, size) {
            selectedSizes[productId] = size;
            const product = productsData.find(p => p.id === productId);
            document.getElementById(`price-display-${productId}`).innerText = `฿${product.prices[size].toLocaleString()}`;
            renderProducts();
        }

        function addToCart(productId) {
            const product = productsData.find(p => p.id === productId);
            if (product.stock > 0) {
                const size = selectedSizes[productId];
                product.stock -= 1;
                const imgSrc = product.img.includes('ใส่รูป') ? 'https://via.placeholder.com/200/111111/39ff14?text=NO+IMAGE' : product.img;
                cart.push({ cartId: Date.now() + Math.random(), productId, name: product.name, size, price: product.prices[size], img: imgSrc });
                updateUI();
            } else { alert("สินค้าหมด!"); }
        }

        function removeFromCart(cartId, productId) {
            const product = productsData.find(p => p.id === productId);
            product.stock += 1;
            cart = cart.filter(item => item.cartId !== cartId);
            updateUI();
        }

        function clearCart() {
            cart.forEach(item => { productsData.find(p => p.id === item.productId).stock += 1; });
            cart = []; updateUI();
        }

        function updateUI() {
            const cartContainer = document.getElementById('cart-items');
            if(cart.length === 0) {
                cartContainer.innerHTML = `<span class="text-gray-600 text-sm italic">${i18n[currentLang].empty}</span>`;
            } else {
                cartContainer.innerHTML = cart.map(item => `
                    <div class="bg-[#111] text-neon px-3 py-1.5 rounded-full flex items-center gap-2 border border-neon/20 flex-shrink-0">
                        <span class="text-[10px] font-bold">${item.name} (${item.size})</span>
                        <button onclick="removeFromCart(${item.cartId}, ${item.productId})" class="text-red-500 text-xs">✕</button>
                    </div>
                `).join('');
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = total.toLocaleString();
            document.getElementById('checkout-total').innerText = total.toLocaleString();
            renderProducts();
        }

        function openCheckout() {
            if (cart.length === 0) return alert("กรุณาเลือกสินค้า");
            const cp = document.getElementById('checkout-page');
            cp.style.display = 'flex';
            setTimeout(() => cp.classList.remove('translate-y-full'), 10);
            document.getElementById('checkout-list').innerHTML = cart.map(item => `
                <div class="flex items-center gap-4 bg-[#111] p-3 rounded-xl border border-gray-800">
                    <img src="${item.img}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-1 text-xs"><p class="font-bold text-gray-200">${item.name}</p><p class="text-gray-500">ขนาด: ${item.size}</p></div>
                    <p class="text-neon font-bold">฿${item.price.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function closeCheckout() {
            const cp = document.getElementById('checkout-page');
            cp.classList.add('translate-y-full');
            setTimeout(() => cp.style.display = 'none', 300);
        }

        function confirmPayment() {
    const name = document.getElementById('cust-name').value;
    const tel = document.getElementById('cust-tel').value;
    const addr = document.getElementById('cust-addr').value;

    if (!name || !tel || !addr) {
        return alert("กรุณากรอกข้อมูลจัดส่งให้ครบถ้วน");
    }

    // จุดสำคัญ: ต้องมี .join('%0A') ปิดท้ายแบบนี้ครับ
    let itemsText = cart.map(item => `- ${item.name} (${item.size}) x${item.qty}`).join('%0A');
    let total = document.getElementById('checkout-total').innerText;

    let lineMessage = encodeURIComponent(`📌 *NEW ORDER* \n------------------\nชื่อ: ${name}\nเบอร์: ${tel}\nที่อยู่: ${addr}\n------------------\nรายการ:\n${itemsText}\n------------------\nyยอดรวม: ${total}`);

    const lineId = "ais_990"; 
    window.open(`https://line.me/ti/p/~${lineId}?text=${lineMessage}`, '_blank');

    cart = [];
    updateUI();
    closeCheckout();
}
    </script>
</body>
</html>
