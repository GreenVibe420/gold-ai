<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD AI TERMINAL PRO</title>

<style>
body{
    margin:0;
    background:#000;
    color:#39ff14;
    font-family:monospace;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-bottom:2px solid #39ff14;
    text-shadow:0 0 15px #39ff14;
}

/* BOX */
.box{
    border:2px solid #39ff14;
    border-radius:15px;
    padding:15px;
    margin:15px;
    box-shadow:0 0 20px #39ff14;
}

/* GRID 3 ช่อง */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    padding:10px;
}

/* AI BAR */
.bar{
    height:10px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
}
.fill{
    height:100%;
    background:#39ff14;
}

/* NEWS */
.news-item{
    padding:5px;
    border-bottom:1px solid #39ff14;
}

/* ALERT */
.alert{
    color:red;
    font-weight:bold;
    animation:blink 1s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="header">
🟢 XAUUSD AI TERMINAL PRO
</div>

<!-- ราคา -->
<div class="box">
PRICE: <span id="price">Loading...</span>
</div>

<!-- กราฟ -->
<div class="box">
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=1"
width="100%" height="300"></iframe>
</div>

<!-- AI -->
<div class="grid">

<div class="box">
⚡ AI FAST (1M)<br>
<span id="ai1"></span>
<div class="bar"><div id="bar1" class="fill"></div></div>
</div>

<div class="box">
🧠 AI SMART (5M)<br>
<span id="ai5"></span>
<div class="bar"><div id="bar5" class="fill"></div></div>
</div>

<div class="box">
📊 TREND<br>
<span id="trend"></span>
</div>

</div>

<!-- ข่าว -->
<div class="box">
🌍 ข่าว + Impact
<div id="news"></div>
</div>

<script>

/* ===== ราคา Fake (เดี๋ยวอัป API ทีหลัง) ===== */
let price = 4400;

function updatePrice(){
    let change = (Math.random()-0.5)*5;
    price += change;

    let percent = (change/price*100).toFixed(2);

    let color = change>=0 ? "lime" : "red";

    document.getElementById("price").innerHTML =
    `<span style="color:${color}">${price.toFixed(2)} USD (${percent}%)</span>`;
}
setInterval(updatePrice,1000);

/* ===== AI ===== */
function ai(){
    let a1 = Math.floor(Math.random()*100);
    let a5 = Math.floor(Math.random()*100);

    document.getElementById("ai1").innerHTML =
    a1+"% "+(a1>50?"BUY 📈":"SELL 📉");

    document.getElementById("ai5").innerHTML =
    a5+"% "+(a5>50?"BUY 📈":"SELL 📉");

    document.getElementById("bar1").style.width=a1+"%";
    document.getElementById("bar5").style.width=a5+"%";

    /* trend */
    let trend = (a1+a5)/2;
    document.getElementById("trend").innerHTML =
    trend>50 ? "UPTREND 📈" : "DOWNTREND 📉";

    /* ALERT */
    if(a1>80 && a5>70){
        addNews("🚨 ทองกำลังพุ่งแรงมาก!", "HIGH", "+90%", true);
    }
    if(a1<20 && a5<30){
        addNews("⚠️ ทองมีโอกาสร่วง!", "HIGH", "-85%", true);
    }
}
setInterval(ai,5000);

/* ===== ข่าว ===== */
function addNews(text,impact,percent,alert=false){
    let color = percent.includes("+") ? "lime" : "red";

    let html = `
    <div class="news-item ${alert?'alert':''}">
    ${text} | Impact: ${impact} |
    <span style="color:${color}">${percent}</span>
    </div>
    `;

    document.getElementById("news").innerHTML =
    html + document.getElementById("news").innerHTML;
}

/* ข่าวเริ่มต้น */
addNews("Fed มีผลต่อทอง","HIGH","+60%");
addNews("USD แข็งค่า","MEDIUM","-40%");

</script>

</body>
</html>
