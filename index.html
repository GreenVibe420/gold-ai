<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GREENCAT V11 - FIREBASE REALTIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --violet: #4c1d95; --gold: #fbbf24; --gold-glow: #f59e0b;
            --bg: #0f071a; --card: #1e1135; --border: #332152; --text: #f3f4f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; width: 100vw; height: 100vh; }

        /* --- LANDING PAGE --- */
        #page-landing { 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1080x1920?text=GREENCAT+COVER') no-repeat center center;
            background-size: cover; z-index: 5000; position: fixed; inset: 0; transition: 0.8s;
        }
        .enter-txt { position: absolute; bottom: 50px; font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 3px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* --- FRAMES --- */
        .avatar-wrap { position: relative; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid transparent; }
        .f-brz { border-color: #cd7f32; box-shadow: 0 0 10px #cd7f32; }
        .f-slv { border-color: #e5e7eb; box-shadow: 0 0 10px #e5e7eb; }
        .f-gld { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .f-dia { border-color: #00f2ff; box-shadow: 0 0 20px #00f2ff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        /* --- LAYOUT --- */
        .page { display: none; height: 100vh; width: 100%; position: absolute; background: var(--bg); overflow-y: auto; padding-bottom: 90px; }
        .page.active { display: block; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(30,17,53,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); sticky: top 0; z-index: 100; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 8px; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; }
        .btn-buy { width: 100%; background: var(--violet); color: white; border: none; padding: 6px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-top: 5px; }

        /* --- WHEEL --- */
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 30px auto; }
        #canvas { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); border-radius: 50%; border: 8px solid var(--card); }
        .wheel-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: var(--gold); color: #000; border-radius: 50%; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; font-size: 12px; border: 4px solid #000; }

        /* --- FORMS --- */
        input, textarea { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 10px; outline: none; }
        .btn-main { width: 100%; background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 15px; font-weight: 900; font-size: 16px; }

        /* --- NAV --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #6d4baf; font-size: 18px; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { font-size: 9px; margin-top: 4px; font-weight: bold; }

        #winPopup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="page-landing" onclick="enterApp()">
        <div class="enter-txt">แตะเพื่อเข้าสู่ระบบ</div>
    </div>

    <div id="page-shop" class="page">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;" onclick="nav('page-profile')">
                <div class="avatar-wrap"><img src="" id="h-img" class="avatar-img"></div>
                <div>
                    <p id="h-name" style="font-weight:bold; font-size:14px;">กำลังโหลด...</p>
                    <p style="font-size:9px; color:var(--gold)">VIP LEVEL <span id="h-lv">1</span></p>
                </div>
            </div>
            <i class="fas fa-crown" style="color:var(--gold)" onclick="nav('page-vip')"></i>
        </div>
        <div class="grid" id="shopGrid"></div>
    </div>

    <div id="page-vip" class="page">
        <div class="header">
            <span onclick="nav('page-shop')"><i class="fas fa-chevron-left"></i> ย้อนกลับ</span>
            <span style="font-weight:bold;">รางวัลเลเวล</span>
        </div>
        <div id="vipContent" style="padding:15px;"></div>
    </div>

    <div id="page-spin" class="page">
        <div style="padding:20px; text-align:center;">
            <h2 style="color:var(--gold)">LUCKY WHEEL</h2>
            <div class="wheel-container">
                <img src="https://i.imgur.com/vK86uHk.png" style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:30px; z-index:110;">
                <canvas id="canvas" width="500" height="500"></canvas>
                <div class="wheel-btn" onclick="spin()">
                    <span>หมุน</span>
                    <span id="spinCount" style="font-size:10px;">0 สิทธิ์</span>
                </div>
            </div>
            <div id="waitAdmin" style="background:rgba(239,68,68,0.2); color:#ef4444; padding:15px; border-radius:12px; font-size:12px; display:none; border:1px solid #ef4444;">
                <i class="fas fa-clock"></i> สลิปของคุณกำลังรอแอดมินตรวจสอบ...
            </div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div style="padding:30px; text-align:center;">
            <div class="avatar-wrap" style="width:100px; height:100px; margin:0 auto 20px;">
                <img src="" id="p-img" class="avatar-img">
                <label style="position:absolute; bottom:0; right:0; background:var(--gold); width:30px; height:30px; border-radius:50%; display:flex; justify-content:center; align-items:center; color:#000;">
                    <i class="fas fa-camera" style="font-size:12px;"></i>
                    <input type="file" hidden onchange="uploadAvatar(event)">
                </label>
            </div>
            <h2 id="p-name">PLAYER</h2> <i class="fas fa-edit" style="color:var(--gold)" onclick="editName()"></i>
            <p style="color:var(--gold); margin-top:5px;">VIP LEVEL <span id="p-lv">1</span></p>
            <div style="margin-top:40px; text-align:left; font-size:10px; opacity:0.5;">
                ID: <span id="u-id"></span>
            </div>
        </div>
    </div>

    <div id="page-checkout" class="page">
        <div style="padding:20px;">
            <h3 style="color:var(--gold); margin-bottom:15px;">ข้อมูลจัดส่ง (ภาษาไทย)</h3>
            <input type="text" id="cName" placeholder="ชื่อ-นามสกุล">
            <textarea id="cAddr" rows="3" placeholder="ที่อยู่จัดส่งโดยละเอียด"></textarea>
            <div style="background:#fff; color:#000; padding:15px; border-radius:15px; text-align:center; margin-bottom:15px;">
                <p style="font-size:12px; font-weight:bold;">สแกนเพื่อจ่ายเงิน</p>
                <img src="https://via.placeholder.com/150?text=QR+CODE" style="width:130px;">
                <p style="font-size:11px;">ยอดโอน: <span id="totalPrice">0</span> ฿</p>
            </div>
            <div style="border:2px dashed var(--border); padding:20px; text-align:center; border-radius:15px; position:relative;">
                <i class="fas fa-cloud-upload-alt" style="font-size:24px; color:var(--gold);"></i>
                <p style="font-size:11px;">แนบสลิปเพื่อขอรับสิทธิ์หมุน</p>
                <input type="file" id="slipIn" style="position:absolute; inset:0; opacity:0;" onchange="document.getElementById('slipPreview').style.display='block'; document.getElementById('slipPreview').src=URL.createObjectURL(this.files[0])">
                <img id="slipPreview" style="width:100%; display:none; margin-top:10px; border-radius:10px;">
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="submitOrder()">ยืนยันสั่งซื้อ</button>
        </div>
    </div>

    <div id="winPopup">
        <i class="fas fa-crown" style="font-size:60px; color:var(--gold); margin-bottom:15px;"></i>
        <h1 style="color:var(--gold)">ยินดีด้วย!</h1>
        <h2 id="winName" style="font-size:30px; margin:15px 0;">รางวัล</h2>
        <button class="btn-main" style="width:180px;" onclick="document.getElementById('winPopup').style.display='none'">ตกลง</button>
    </div>

    <div class="nav" id="mainNav" style="display:none;">
        <div class="nav-item active" onclick="nav('page-shop')" id="n-shop"><i class="fas fa-store"></i><span>ร้านค้า</span></div>
        <div class="nav-item" onclick="nav('page-spin')" id="n-spin"><i class="fas fa-sync-alt"></i><span>วงล้อ</span></div>
        <div class="nav-item" onclick="nav('page-profile')" id="n-prof"><i class="fas fa-user-circle"></i><span>โปรไฟล์</span></div>
    </div>

    <script>
        // --- CONFIG FIREBASE (ใส่ของคุณแล้ว) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCpqWtEIqNk3lsV8NXO6yD2cWpZYZKYjio",
            authDomain: "greencat-c40c6.firebaseapp.com",
            projectId: "greencat-c40c6",
            storageBucket: "greencat-c40c6.firebasestorage.app",
            messagingSenderId: "574032692697",
            appId: "1:574032692697:web:8479887ece1df85115c5c8",
            measurementId: "G-4N42Y7W2RK"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- USER ID SYSTEM ---
        let uid = localStorage.getItem('greencat_uid') || ('user_' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('greencat_uid', uid);

        let userData = { name: "Player", lv: 1, spins: 0, img: "https://via.placeholder.com/100", pending: false };

        function sync() {
            db.ref('players/' + uid).on('value', (snap) => {
                if(snap.val()) { userData = snap.val(); updateUI(); }
                else { db.ref('players/' + uid).set(userData); }
            });
        }

        function updateUI() {
            document.getElementById('h-name').innerText = document.getElementById('p-name').innerText = userData.name;
            document.getElementById('h-lv').innerText = document.getElementById('p-lv').innerText = userData.lv;
            document.getElementById('h-img').src = document.getElementById('p-img').src = userData.img;
            document.getElementById('spinCount').innerText = userData.spins + " สิทธิ์";
            document.getElementById('u-id').innerText = uid;
            document.getElementById('waitAdmin').style.display = userData.pending ? 'block' : 'none';

            const frame = userData.lv >= 41 ? 'f-dia' : userData.lv >= 26 ? 'f-gld' : userData.lv >= 11 ? 'f-slv' : 'f-brz';
            document.getElementById('h-img').className = document.getElementById('p-img').className = 'avatar-img ' + frame;
        }

        // --- APP LOGIC ---
        function enterApp() { document.getElementById('page-landing').style.opacity='0'; setTimeout(()=>{ document.getElementById('page-landing').style.display='none'; document.getElementById('mainNav').style.display='flex'; nav('page-shop'); }, 800); }
        
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id==='page-shop') document.getElementById('n-shop').classList.add('active');
            if(id==='page-spin') { document.getElementById('n-spin').classList.add('active'); drawWheel(); }
            if(id==='page-profile') document.getElementById('n-prof').classList.add('active');
        }

        // SHOP GRID
        const grid = document.getElementById('shopGrid');
        for(let i=1; i<=30; i++) {
            grid.innerHTML += `<div class="card">
                <img src="https://via.placeholder.com/200/1e1135/fbbf24?text=CAT+${i}">
                <div style="font-size:9px; color:#aaa; margin:5px 0;">Premium Item ${i}</div>
                <div style="color:var(--gold); font-size:11px; font-weight:bold;">${300+(i*10)} ฿</div>
                <button class="btn-buy" onclick="checkout(${300+(i*10)})">ซื้อเลย</button>
            </div>`;
        }

        function checkout(p) { document.getElementById('totalPrice').innerText = p; nav('page-checkout'); }

        function submitOrder() {
            if(!document.getElementById('slipIn').files[0]) return alert("กรุณาแนบสลิป!");
            db.ref('players/' + uid).update({ pending: true });
            alert("ส่งข้อมูลสำเร็จ! รอแอดมินอนุมัติเพื่อเพิ่มเลเวล");
            
            // จำลองแอดมินอนุมัติ (คุณสามารถไปเปลี่ยนค่าเองใน Firebase Console ได้จริงๆ)
            setTimeout(() => {
                db.ref('players/' + uid).update({ pending: false, lv: userData.lv + 1, spins: userData.spins + 2 });
                alert("แอดมินอนุมัติแล้ว! LV UP + ได้รับ 2 สิทธิ์หมุน");
            }, 5000);
            nav('page-shop');
        }

        // WHEEL
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const prizes = ["10G GOLD", "MISS", "1G GOLD", "50 THB", "SPIN x2", "MISS", "VOUCHER", "FREE ITEM", "100 THB", "MISS"];

        function drawWheel() {
            const arc = (Math.PI*2)/10;
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = i%2==0 ? "#4c1d95" : "#1e1135";
                ctx.moveTo(250,250); ctx.arc(250,250,250,i*arc,(i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc+arc/2);
                ctx.fillStyle = "#fbbf24"; ctx.font="bold 16px Kanit"; ctx.textAlign="right"; ctx.fillText(p, 230, 10); ctx.restore();
            });
        }

        function spin() {
            if(userData.spins <= 0) return alert("คุณไม่มีสิทธิ์หมุน!");
            db.ref('players/' + uid).update({ spins: userData.spins - 1 });
            const deg = Math.floor(Math.random()*360) + 3600;
            canvas.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                const idx = Math.floor(((360 - (deg % 360)) % 360) / 36);
                if(prizes[idx]==="MISS") alert("เสียใจด้วย พยายามใหม่นะ!");
                else { document.getElementById('winName').innerText = prizes[idx]; document.getElementById('winPopup').style.display='flex'; }
            }, 5000);
        }

        function editName() { const n = prompt("ชื่อใหม่ของคุณ:"); if(n) db.ref('players/' + uid).update({ name: n }); }
        function uploadAvatar(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => db.ref('players/' + uid).update({ img: ev.target.result });
                reader.readAsDataURL(file);
            }
        }

        // VIP TABLE
        for(let v=1; v<=50; v++) {
            document.getElementById('vipContent').innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border); font-size:12px;">
                    <span>LV.${v}</span>
                    <span style="color:var(--gold)">สินค้าฟรี 1 + หมุนฟรี 2</span>
                    <span style="opacity:0.5">${v>=41?'Diamond':v>=26?'Gold':v>=11?'Silver':'Bronze'}</span>
                </div>`;
        }

        sync();
    </script>
</body>
</html>
