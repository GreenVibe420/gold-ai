<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greencat AI Analytics Cloud v4</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #39ff14;
            --banker-red: #ff4d4d;
            --player-blue: #4d94ff;
            --warning-yellow: #f1c40f;
            --dark-bg: #050505;
            --panel-bg: #111111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--dark-bg); color: white; height: 100vh; overflow: hidden; }

        .wrapper { display: flex; height: 100vh; width: 100%; }
        
        .sidebar { 
            width: 240px; min-width: 240px; background: var(--panel-bg); 
            border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; 
        }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; background: #080808; }
        .card { background: #151515; border: 1px solid #222; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .grid-layout { display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 15px; border-radius: 8px; border: 1px solid var(--neon-green); background: transparent; color: var(--neon-green); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }
        .btn-p { border-color: var(--player-blue); color: var(--player-blue); }
        .btn-b { border-color: var(--banker-red); color: var(--banker-red); }

        .prediction-box { text-align: center; border: 2px solid #333; border-radius: 15px; padding: 25px; background: #0a0a0a; }
        .text-neon { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #222; }

        /* Multi-AI Sub Panel */
        .ai-nodes { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .ai-node { text-align: center; font-size: 0.8rem; width: 30%; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .ai-status { font-weight: bold; margin-top: 5px; font-size: 1rem; }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; height: auto; }
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav class="sidebar">
            <div style="padding: 25px; text-align: center;">
                <h2 class="text-neon"><i class="fa-solid fa-cat"></i> GREENCAT</h2>
                <p style="font-size: 0.7rem; color: #555; margin-top: 5px;">v4.0 MULTI-NODE AI</p>
            </div>
            <div style="padding: 10px;">
                <div style="padding: 15px; color: var(--neon-green); background: rgba(57,255,20,0.05); border-radius: 8px;">
                    <i class="fa-solid fa-gauge"></i> Terminal
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="grid-layout">
                <div>
                    <div class="card">
                        <h3><i class="fa-solid fa-database"></i> Live Data Input</h3>
                        <div class="btn-group">
                            <button class="btn btn-p" onclick="sendToFirebase('P')">PLAYER</button>
                            <button class="btn" onclick="sendToFirebase('T')" style="border-color:#2ecc71; color:#2ecc71;">TIE</button>
                            <button class="btn btn-b" onclick="sendToFirebase('B')">BANKER</button>
                        </div>
                    </div>

                    <div class="card">
                        <h3><i class="fa-solid fa-list"></i> Target History</h3>
                        <table>
                            <thead><tr><th>TIME</th><th>RESULT</th></tr></thead>
                            <tbody id="history-table"></tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <div class="card" style="border-color: var(--neon-green);">
                        <h3 class="text-neon"><i class="fa-solid fa-network-wired"></i> Master AI Decision</h3>
                        <div class="prediction-box" id="main-predict-box">
                            <p style="color: #888; font-size: 0.85rem;" id="ai-strategy-text">ANALYZING PATTERN...</p>
                            <h1 id="predict-text" style="font-size: 2.8rem; margin: 15px 0;">WAIT</h1>
                            <div style="background: #222; height: 8px; border-radius: 4px; overflow: hidden;">
                                <div id="conf-bar" style="width: 0%; height: 100%; background: var(--neon-green); transition: 1s;"></div>
                            </div>
                            <p id="conf-text" style="margin-top: 10px; font-size: 0.9rem;">Confidence: 0%</p>
                        </div>

                        <div class="ai-nodes">
                            <div class="ai-node">
                                <span style="color: #666;">Alpha Node</span><br>(Trend)
                                <div class="ai-status" id="node-1">--</div>
                            </div>
                            <div class="ai-node">
                                <span style="color: #666;">Beta Node</span><br>(Reversal)
                                <div class="ai-status" id="node-2">--</div>
                            </div>
                            <div class="ai-node" style="border-color: var(--neon-green);">
                                <span class="text-neon">Master</span><br>(Final)
                                <div class="ai-status" id="node-master">--</div>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn" style="width: 100%; border-color: #444; color: #444;" onclick="resetData()">FORMAT DATABASE</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCpqWtEIqNk3lsV8NXO6yD2cWpZYZKYjio",
            authDomain: "greencat-c40c6.firebaseapp.com",
            databaseURL: "https://greencat-c40c6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "greencat-c40c6",
            storageBucket: "greencat-c40c6.firebasestorage.app",
            messagingSenderId: "574032692697",
            appId: "1:574032692697:web:2778aaf8d0c5a07c15c5c8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendToFirebase(result) {
            db.ref('game_logs').push().set({ res: result, timestamp: new Date().toLocaleTimeString() });
        }

        function resetData() { if(confirm("Format and erase all cloud data?")) db.ref('game_logs').remove(); }

        // 2. Data Listener
        db.ref('game_logs').on('value', (snapshot) => {
            const data = snapshot.val();
            const historyArray = [];
            if (data) { Object.keys(data).forEach(key => historyArray.push(data[key])); }
            updateUI(historyArray);
            runMultiNodeAI(historyArray);
        });

        function updateUI(history) {
            const table = document.getElementById('history-table');
            table.innerHTML = '';
            history.slice().reverse().slice(0, 8).forEach(item => {
                const color = item.res === 'P' ? 'var(--player-blue)' : (item.res === 'B' ? 'var(--banker-red)' : '#2ecc71');
                table.innerHTML += `<tr><td>${item.timestamp}</td><td style="color:${color}; font-weight:bold;">${item.res === 'P' ? 'PLAYER' : (item.res === 'B' ? 'BANKER' : 'TIE')}</td></tr>`;
            });
        }

        // --- 3. Multi-Node AI Engine (ระบบหาโอกาสเปลี่ยนทิศทาง) ---
        function runMultiNodeAI(history) {
            if (history.length < 3) return;

            // กรองเอาเฉพาะ P กับ B (ข้าม Tie เพื่อคำนวณเค้าไพ่หลัก)
            const cleanHistory = history.map(h => h.res).filter(r => r === 'P' || r === 'B');
            if (cleanHistory.length < 3) return;

            const lastRes = cleanHistory[cleanHistory.length - 1];
            
            // ตรวจจับความยาวของการออกซ้ำ (Streak Counter)
            let streak = 1;
            for (let i = cleanHistory.length - 2; i >= 0; i--) {
                if (cleanHistory[i] === lastRes) streak++;
                else break;
            }

            let node1_predict, node2_predict, master_predict;
            let strategyMessage = "";
            let confidence = 0;

            const oppositeRes = lastRes === 'P' ? 'B' : 'P';

            // --------------------------------------------------
            // Node 1: Alpha (สายตามเทรนด์ - มองว่ามังกรจะมา)
            // --------------------------------------------------
            node1_predict = lastRes; 

            // --------------------------------------------------
            // Node 2: Beta (สายหาจุดกลับตัว / ตัดไม้)
            // --------------------------------------------------
            // ถ้าซ้ำเกิน 3 รอบ (เช่น P P P P) Beta จะสั่งเริ่มเตรียมตัวตัด (หาจังหวะสวน)
            if (streak >= 4) {
                node2_predict = oppositeRes; 
            } else {
                node2_predict = lastRes; // ถ้าน้อยกว่า 4 ให้คล้อยตามไปก่อน
            }

            // --------------------------------------------------
            // Master Core (ผู้ชี้ขาดตัดสินใจ)
            // --------------------------------------------------
            if (streak >= 5) {
                // ออกซ้ำ 5 ครั้งขึ้นไป -> Master ตัดสินใจ "ตัดทิศทางอย่างเด็ดขาด"
                master_predict = oppositeRes;
                strategyMessage = "⚠️ CRITICAL STREAK: CHANGING DIRECTION (แนะนำตัดมังกร)";
                confidence = 85;
                document.getElementById('main-predict-box').style.borderColor = "var(--warning-yellow)";
            } 
            else if (streak === 4) {
                // ออกซ้ำ 4 ครั้ง -> เสียงแตก AI-1 ให้ตาม, AI-2 ให้ตัด
                master_predict = "WAIT / SKIP"; // แนะนำให้รอดู (ข้ามตานี้) เพราะความเสี่ยงสูง
                strategyMessage = "⚡ CONFLICT DETECTED: HIGH RISK. RECOMMEND TO SKIP.";
                confidence = 40;
                document.getElementById('main-predict-box').style.borderColor = "#888";
            }
            else {
                // เคสปกติ (ปิงปอง หรือ มังกรเพิ่งเริ่ม 1-3 ตัว)
                master_predict = lastRes === cleanHistory[cleanHistory.length - 2] ? lastRes : oppositeRes;
                strategyMessage = "STANDARD PATTERN TRACKING";
                confidence = Math.floor(Math.random() * (78 - 65 + 1)) + 65;
                document.getElementById('main-predict-box').style.borderColor = "#333";
            }

            // --- Update UI ---
            updateAINodeUI('node-1', node1_predict);
            updateAINodeUI('node-2', node2_predict);
            updateAINodeUI('node-master', master_predict);

            const display = document.getElementById('predict-text');
            if(master_predict === 'P') { display.innerText = 'PLAYER'; display.style.color = 'var(--player-blue)'; }
            else if(master_predict === 'B') { display.innerText = 'BANKER'; display.style.color = 'var(--banker-red)'; }
            else { display.innerText = master_predict; display.style.color = '#888'; }

            document.getElementById('ai-strategy-text').innerText = strategyMessage;
            document.getElementById('conf-bar').style.width = confidence + "%";
            document.getElementById('conf-bar').style.background = (streak >= 5) ? "var(--warning-yellow)" : "var(--neon-green)";
            document.getElementById('conf-text').innerText = `Confidence: ${confidence}%`;
        }

        function updateAINodeUI(elementId, res) {
            const el = document.getElementById(elementId);
            if(res === 'P') { el.innerText = 'PLAYER'; el.style.color = 'var(--player-blue)'; }
            else if(res === 'B') { el.innerText = 'BANKER'; el.style.color = 'var(--banker-red)'; }
            else { el.innerText = 'SKIP'; el.style.color = '#888'; }
        }
    </script>
</body>
</html>
