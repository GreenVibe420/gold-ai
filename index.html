<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<title>XAUUSD AI PRO</title>

<style>
body{
    margin:0;
    background:#000;
    color:#39ff14;
    font-family:'Share Tech Mono', monospace;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    font-size:26px;
    border-bottom:2px solid #39ff14;
}

.price-box{
    margin:15px;
    padding:15px;
    border:2px solid #39ff14;
    border-radius:20px;
    text-align:center;
    font-size:24px;
    box-shadow:0 0 25px #39ff14;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.box{
    border:2px solid #39ff14;
    border-radius:20px;
    padding:15px;
    box-shadow:0 0 20px #39ff14;
}

.buy{ color:#00ffcc; }
.sell{ color:red; }
</style>
</head>

<body>

<div class="header">
    <div>🌐 XAUUSD AI PRO</div>
    <div id="time"></div>
</div>

<div class="price-box">
    PRICE : <span id="price">Loading...</span>
</div>

<div style="padding:10px;">
<div id="tv_chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
    "width":"100%",
    "height":300,
    "symbol":"OANDA:XAUUSD",
    "interval":"1",
    "theme":"dark",
    "container_id":"tv_chart"
});
</script>
</div>

<div class="grid">

<div class="box">
<h3>⚡ AI FAST (1M)</h3>
<div id="ai1"></div>
</div>

<div class="box">
<h3>🧠 AI SMART (5M)</h3>
<div id="ai5"></div>
</div>

<div class="box">
<h3>🌍 ข่าว</h3>
<div id="news">Loading...</div>
</div>

<div class="box">
<h3>📊 SUMMARY</h3>
<div id="summary"></div>
</div>

</div>

<script>

// 🔑 ใส่ API
const NEWS_API = "0278fb28ca40442189b342195f50d06a";

let priceHistory = [];
let currentPrice = 0;
let marketScore = 0;

/* TIME */
setInterval(()=>{
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
},1000);

/* PRICE */
async function getPrice(){
    try{
        let r = await fetch("https://api.gold-api.com/price/XAUUSD");
        let d = await r.json();

        currentPrice = d.price;
        document.getElementById("price").innerText = currentPrice;

        priceHistory.push(currentPrice);
        if(priceHistory.length > 100) priceHistory.shift();

    }catch{}
}
setInterval(getPrice,3000);
getPrice();

/* EMA */
function EMA(period){
    if(priceHistory.length < period) return currentPrice;

    let k = 2/(period+1);
    let ema = priceHistory[0];

    for(let i=1;i<priceHistory.length;i++){
        ema = priceHistory[i]*k + ema*(1-k);
    }
    return ema;
}

/* RSI */
function RSI(){
    if(priceHistory.length < 15) return 50;

    let gains=0, losses=0;

    for(let i=priceHistory.length-14;i<priceHistory.length;i++){
        let diff = priceHistory[i] - priceHistory[i-1];
        if(diff>0) gains+=diff;
        else losses+=Math.abs(diff);
    }

    let rs = gains / (losses || 1);
    return 100 - (100/(1+rs));
}

/* NEWS */
async function loadNews(){
    try{
        let r = await fetch(`https://newsapi.org/v2/everything?q=gold&apiKey=${NEWS_API}`);
        let d = await r.json();

        let total=0;
        let html="";

        d.articles.slice(0,3).forEach(n=>{
            let text = (n.title||"").toLowerCase();

            let score = 0;
            if(text.includes("war")) score+=20;
            if(text.includes("inflation")) score+=20;
            if(text.includes("fed")) score-=20;

            total += score;

            html += `${n.title}<br>`;
        });

        marketScore = total;

        document.getElementById("news").innerHTML = html;

    }catch{
        document.getElementById("news").innerHTML="❌ API บล็อก";
    }
}
setInterval(loadNews,300000);
loadNews();

/* AI CORE */
function AI(){

    let ema9 = EMA(9);
    let ema21 = EMA(21);
    let rsi = RSI();

    let signal = "WAIT";
    let score = 0;

    if(ema9 > ema21){
        signal = "BUY";
        score += 30;
    }else{
        signal = "SELL";
        score += 30;
    }

    if(rsi < 30){
        signal = "BUY";
        score += 30;
    }

    if(rsi > 70){
        signal = "SELL";
        score += 30;
    }

    score += marketScore;

    let confidence = Math.min(95, Math.abs(score));

    let entry = currentPrice;

    let tp = signal==="BUY"
        ? entry + (confidence * 0.4)
        : entry - (confidence * 0.4);

    let sl = signal==="BUY"
        ? entry - (confidence * 0.25)
        : entry + (confidence * 0.25);

    return {
        signal,
        confidence,
        entry: entry.toFixed(2),
        tp: tp.toFixed(2),
        sl: sl.toFixed(2)
    };
}

/* UPDATE UI */
function update(){

    let a1 = AI();
    let a5 = AI();

    document.getElementById("ai1").innerHTML = `
    Signal: <span class="${a1.signal==='BUY'?'buy':'sell'}">${a1.signal}</span><br>
    Conf: ${a1.confidence}%<br>
    Entry: ${a1.entry}<br>
    TP: ${a1.tp}<br>
    SL: ${a1.sl}
    `;

    document.getElementById("ai5").innerHTML = `
    Signal: <span class="${a5.signal==='BUY'?'buy':'sell'}">${a5.signal}</span><br>
    Conf: ${a5.confidence}%<br>
    Entry: ${a5.entry}<br>
    TP: ${a5.tp}<br>
    SL: ${a5.sl}
    `;

    document.getElementById("summary").innerHTML =
    a5.signal==="BUY" ? "📈 UP TREND" : "📉 DOWN TREND";
}

setInterval(update,10000);
update();

</script>

</body>
</html>
